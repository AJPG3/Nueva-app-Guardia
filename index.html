<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CÁDIZ POL - Sistema Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space+Grotesk', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .option-card { transition: all 0.2s; border: 2px solid transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MUNICIPIOS = ["Cádiz", "Jerez", "Algeciras", "San Fernando", "El Puerto", "Chiclana", "Sanlúcar", "La Línea"];

        const App = () => {
            const [view, setView] = useState('menu');
            const [loading, setLoading] = useState(false);
            const [errorDb, setErrorDb] = useState([]);
            const [test, setTest] = useState({ 
                questions: [], 
                answers: {}, 
                current: 0, 
                finished: false,
                municipio: "" 
            });
            const [config, setConfig] = useState({ mun: "Cádiz", num: 20 });

            const apiKey = "AIzaSyBl1TDv5-OIBZGYLTCQ_v4g_oxkJPNs6eg";

            // Cargar Almacén de Errores al iniciar
            useEffect(() => {
                const saved = localStorage.getItem('opo_cadiz_errors');
                if (saved) setErrorDb(JSON.parse(saved));
            }, []);

            const saveErrors = (newErrors) => {
                const updated = [...errorDb];
                newErrors.forEach(err => {
                    if (!updated.find(e => e.q === err.q)) updated.push(err);
                });
                setErrorDb(updated);
                localStorage.setItem('opo_cadiz_errors', JSON.stringify(updated));
            };

            const callIA = async (prompt) => {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                return JSON.parse(data.candidates[0].content.parts[0].text);
            };

            const startTest = async (isReview = false) => {
                setLoading(true);
                try {
                    // Prompt optimizado para velocidad (menos tokens)
                    const prompt = isReview 
                        ? `Genera un test con estas preguntas falladas: ${JSON.stringify(errorDb.slice(0, 15))}. JSON: {"qs":[{"q":"..","o":[".."],"a":0,"j":".."}]}`
                        : `Genera ${config.num} preguntas de oposición Policía Local para ${config.mun} (Cádiz). Temario: Tráfico, Penal, Local. JSON: {"qs":[{"q":"Pregunta","o":["A","B","C","D"],"a":0,"j":"Justificación"}]}`;
                    
                    const result = await callIA(prompt);
                    setTest({
                        questions: result.qs,
                        answers: {},
                        current: 0,
                        finished: false,
                        municipio: isReview ? "Repaso de Errores" : config.mun
                    });
                    setView('quiz');
                } catch (e) {
                    alert("Error en IA: Demasiado tráfico. Reintenta.");
                } finally {
                    setLoading(false);
                }
            };

            const handleAnswer = (idx) => {
                if (test.finished) return;
                setTest(prev => ({
                    ...prev,
                    answers: { ...prev.answers, [prev.current]: idx }
                }));
            };

            const finalize = () => {
                const fails = [];
                test.questions.forEach((q, i) => {
                    if (test.answers[i] !== undefined && test.answers[i] !== q.a) {
                        fails.push(q);
                    }
                });
                if (fails.length > 0) saveErrors(fails);
                setTest(prev => ({ ...prev, finished: true }));
            };

            const deleteError = (idx) => {
                const updated = errorDb.filter((_, i) => i !== idx);
                setErrorDb(updated);
                localStorage.setItem('opo_cadiz_errors', JSON.stringify(updated));
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center p-10">
                    <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-blue-400 font-bold tracking-widest animate-pulse">CARGANDO TEST OFICIAL...</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative overflow-hidden">
                    {/* Header */}
                    <header className="p-6 flex justify-between items-center glass border-b border-white/5 shrink-0">
                        <div>
                            <h1 className="font-bold text-xl tracking-tight">POLICÍA <span className="text-blue-500">CÁDIZ</span></h1>
                            <p className="text-[10px] opacity-50 font-medium">SISTEMA DE PREPARACIÓN v4.0</p>
                        </div>
                        {view === 'quiz' && (
                            <div className="text-right">
                                <span className="text-xs font-bold text-blue-400">{test.current + 1} / {test.questions.length}</span>
                                <div className="w-16 h-1 bg-white/10 rounded-full mt-1 overflow-hidden">
                                    <div className="h-full bg-blue-500" style={{width: `${((test.current+1)/test.questions.length)*100}%`}}></div>
                                </div>
                            </div>
                        )}
                    </header>

                    <main className="flex-1 overflow-y-auto custom-scroll p-4 pb-32">
                        {view === 'menu' && (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="glass rounded-3xl p-6">
                                    <h2 className="text-sm font-bold text-blue-400 mb-4 uppercase tracking-wider">Configuración</h2>
                                    <div className="space-y-4">
                                        <select 
                                            value={config.mun} 
                                            onChange={e => setConfig({...config, mun: e.target.value})}
                                            className="w-full bg-slate-800 p-4 rounded-xl border border-white/10 font-bold"
                                        >
                                            {MUNICIPIOS.map(m => <option key={m}>{m}</option>)}
                                        </select>
                                        <div className="flex gap-2">
                                            {[10, 20, 50].map(n => (
                                                <button 
                                                    key={n} 
                                                    onClick={() => setConfig({...config, num: n})}
                                                    className={`flex-1 p-3 rounded-xl font-bold text-xs ${config.num === n ? 'btn-primary' : 'bg-slate-800 border border-white/5'}`}
                                                >
                                                    {n} PREG.
                                                </button>
                                            ))}
                                        </div>
                                        <button onClick={() => startTest(false)} className="w-full btn-primary p-5 rounded-2xl font-bold uppercase tracking-widest shadow-lg shadow-blue-500/20">
                                            Generar Examen
                                        </button>
                                    </div>
                                </div>

                                {errorDb.length > 0 && (
                                    <div className="glass rounded-3xl p-6 border-red-500/20 bg-red-500/5">
                                        <div className="flex justify-between items-center mb-4">
                                            <div>
                                                <h2 className="text-sm font-bold text-red-400 uppercase tracking-wider">Almacén de Errores</h2>
                                                <p className="text-xs opacity-60">{errorDb.length} preguntas guardadas</p>
                                            </div>
                                            <i className="fa-solid fa-database text-red-500/30 text-2xl"></i>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setView('errors')} className="flex-1 bg-white/5 p-4 rounded-xl font-bold text-xs hover:bg-white/10 transition-colors">Ver Lista</button>
                                            <button onClick={() => startTest(true)} className="flex-1 bg-red-600 p-4 rounded-xl font-bold text-xs shadow-lg">Repasar Test</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'quiz' && (
                            <div className="space-y-4 animate-in fade-in duration-300">
                                <div className="glass rounded-2xl p-6 mb-2">
                                    <p className="text-lg font-medium leading-relaxed italic">"{test.questions[test.current].q}"</p>
                                </div>

                                <div className="space-y-3">
                                    {test.questions[test.current].o.map((opt, i) => {
                                        const isSelected = test.answers[test.current] === i;
                                        const isCorrect = i === test.questions[test.current].a;
                                        const finished = test.finished;

                                        let borderColor = "border-white/5 bg-white/5";
                                        if (isSelected && !finished) borderColor = "border-blue-500 bg-blue-500/10";
                                        if (finished) {
                                            if (isCorrect) borderColor = "border-green-500 bg-green-500/20";
                                            else if (isSelected) borderColor = "border-red-500 bg-red-500/20";
                                            else borderColor = "opacity-30";
                                        }

                                        return (
                                            <button 
                                                key={i} 
                                                onClick={() => handleAnswer(i)}
                                                className={`w-full p-4 rounded-xl text-left text-sm font-medium flex gap-3 option-card border ${borderColor}`}
                                            >
                                                <span className={`w-6 h-6 rounded flex items-center justify-center shrink-0 text-[10px] font-bold ${isSelected ? 'bg-blue-500' : 'bg-white/10'}`}>
                                                    {String.fromCharCode(65+i)}
                                                </span>
                                                {opt}
                                            </button>
                                        );
                                    })}
                                </div>

                                {test.finished && (
                                    <div className="mt-6 glass p-5 rounded-2xl border-l-4 border-blue-500 bg-blue-500/5 animate-in slide-in-from-top-2">
                                        <h4 className="text-[10px] font-bold text-blue-400 uppercase mb-2">Justificación Legal</h4>
                                        <p className="text-xs opacity-80 leading-relaxed italic">{test.questions[test.current].j}</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'errors' && (
                            <div className="space-y-4 animate-in slide-in-from-right duration-300">
                                <button onClick={() => setView('menu')} className="flex items-center gap-2 text-xs font-bold text-blue-400 mb-6 uppercase"><i className="fa-solid fa-arrow-left"></i> Volver al Menú</button>
                                {errorDb.map((err, i) => (
                                    <div key={i} className="glass rounded-2xl p-5 relative border-l-2 border-red-500">
                                        <button onClick={() => deleteError(i)} className="absolute top-4 right-4 text-green-500 text-lg active:scale-125 transition-transform">
                                            <i className="fa-solid fa-circle-check"></i>
                                        </button>
                                        <p className="text-xs font-bold pr-8 mb-3 italic">"{err.q}"</p>
                                        <div className="text-[10px] text-green-400 font-bold bg-green-500/10 p-2 rounded-lg mb-2">
                                            CORRECTA: {err.o[err.a]}
                                        </div>
                                        <p className="text-[9px] opacity-50 leading-tight">{err.j}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Navigation Bar / Finalize */}
                    {view === 'quiz' && (
                        <nav className="fixed bottom-0 left-0 right-0 p-4 glass border-t border-white/10 flex gap-3 max-w-md mx-auto z-50">
                            <button 
                                onClick={() => setTest(prev => ({...prev, current: Math.max(0, prev.current-1)}))}
                                className="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center"
                            >
                                <i className="fa-solid fa-chevron-left"></i>
                            </button>
                            
                            {test.current < test.questions.length - 1 ? (
                                <button 
                                    onClick={() => setTest(prev => ({...prev, current: prev.current+1}))}
                                    className="flex-1 btn-primary rounded-2xl font-bold text-xs uppercase tracking-widest"
                                >
                                    Siguiente
                                </button>
                            ) : !test.finished ? (
                                <button 
                                    onClick={finalize}
                                    className="flex-1 bg-green-600 rounded-2xl font-bold text-xs uppercase tracking-widest animate-pulse"
                                >
                                    Finalizar Test
                                </button>
                            ) : (
                                <button 
                                    onClick={() => setView('menu')}
                                    className="flex-1 bg-slate-100 text-slate-900 rounded-2xl font-bold text-xs uppercase tracking-widest"
                                >
                                    Cerrar Resultados
                                </button>
                            )}

                            <button 
                                onClick={() => setTest(prev => ({...prev, current: Math.min(test.questions.length-1, prev.current+1)}))}
                                className="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center"
                            >
                                <i className="fa-solid fa-chevron-right"></i>
                            </button>
                        </nav>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
