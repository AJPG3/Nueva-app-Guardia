<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLICÍA LOCAL ANDALUCÍA - CÁDIZ</title>
    <!-- Cargamos librerías externas con protocolos seguros -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        .gradient-blue { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .app-height { height: 100vh; height: -webkit-fill-available; }
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuración de API (Opcional)
        const apiKey = ""; 
        const modelId = "gemini-2.5-flash-preview-09-2025";

        const TEMARIO = [
            { id: 1, name: "La Constitución Española", cat: "Estado" },
            { id: 2, name: "Derechos y Deberes Fundamentales", cat: "Estado" },
            { id: 3, name: "Tribunal Constitucional", cat: "Estado" },
            { id: 4, name: "La Corona y Cortes Generales", cat: "Estado" },
            { id: 5, name: "El Gobierno y Administración", cat: "Estado" },
            { id: 6, name: "Organización Territorial", cat: "Estado" },
            { id: 7, name: "Estatuto de Andalucía", cat: "Andalucía" },
            { id: 8, name: "Instituciones de la Junta", cat: "Andalucía" },
            { id: 9, name: "Derecho Administrativo", cat: "Admin" },
            { id: 10, name: "Acto Administrativo", cat: "Admin" },
            { id: 11, name: "Régimen Local", cat: "Local" },
            { id: 12, name: "Municipio: Concepto", cat: "Local" },
            { id: 13, name: "Organización Municipal", cat: "Local" },
            { id: 14, name: "Competencias Municipales", cat: "Local" },
            { id: 15, name: "Haciendas Locales", cat: "Local" },
            { id: 16, name: "Función Pública Local", cat: "Local" },
            { id: 17, name: "Policía Local: Funciones", cat: "Policía" },
            { id: 18, name: "Ley 5/2023 de Andalucía", cat: "Policía" },
            { id: 19, name: "Derechos del Funcionario PL", cat: "Policía" },
            { id: 20, name: "Régimen Disciplinario", cat: "Policía" },
            { id: 21, name: "LO 2/86 de Seguridad", cat: "Policía" },
            { id: 22, name: "Derecho Penal: Delitos", cat: "Penal" },
            { id: 23, name: "Seguridad Vial (Código Penal)", cat: "Penal" },
            { id: 24, name: "Proceso Penal: Detención", cat: "Penal" },
            { id: 25, name: "Policía Judicial", cat: "Policía" },
            { id: 26, name: "LO 4/2015 Seguridad Ciudadana", cat: "Estado" },
            { id: 27, name: "Ley de Seguridad Vial", cat: "Tráfico" },
            { id: 28, name: "Reglamento de Circulación", cat: "Tráfico" },
            { id: 29, name: "Reglamento de Vehículos", cat: "Tráfico" },
            { id: 30, name: "Transportes y Cargas", cat: "Tráfico" },
            { id: 31, name: "Accidentología Vial", cat: "Tráfico" },
            { id: 32, name: "Espectáculos Públicos", cat: "Específico" },
            { id: 33, name: "Medio Ambiente y Ruidos", cat: "Específico" },
            { id: 34, name: "Venta Ambulante", cat: "Específico" },
            { id: 35, name: "Urbanismo y Ordenanzas", cat: "Específico" },
            { id: 36, name: "Protección Civil", cat: "Específico" },
            { id: 37, name: "Igualdad y Violencia Género", cat: "Estado" },
            { id: 38, name: "Ética y Deontología", cat: "Policía" },
            { id: 39, name: "Psicotécnicos", cat: "Psico" },
            { id: 40, name: "Ortografía y Cultura", cat: "Cultura" }
        ];

        const App = () => {
            const [view, setView] = useState('home'); 
            const [activeTab, setActiveTab] = useState('temas');
            const [numQ, setNumQ] = useState(20);
            const [selectedTopic, setSelectedTopic] = useState(null);
            const [failedPool, setFailedPool] = useState([]);
            const [test, setTest] = useState({ questions: [], current: 0, answers: {}, source: '' });
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const stored = localStorage.getItem('opocal_errors');
                if (stored) setFailedPool(JSON.parse(stored));
            }, []);

            const saveFailed = (q) => {
                if (!failedPool.some(item => item.q === q.q)) {
                    const newPool = [...failedPool, q];
                    setFailedPool(newPool);
                    localStorage.setItem('opocal_errors', JSON.stringify(newPool));
                }
            };

            const deleteLearned = (qText) => {
                const newPool = failedPool.filter(item => item.q !== qText);
                setFailedPool(newPool);
                localStorage.setItem('opocal_errors', JSON.stringify(newPool));
            };

            const startTest = async (topic) => {
                setLoading(true);
                const title = topic.name || topic;
                
                if (apiKey) {
                    try {
                        const prompt = `Genera un examen de ${numQ} preguntas de test sobre "${title}" para Policía Local de Andalucía. Formato JSON: { "questions": [{ "q": "", "options": ["","","",""], "correct": 0, "expl": "" }] }`;
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                        });
                        const data = await res.json();
                        const json = JSON.parse(data.candidates[0].content.parts[0].text);
                        setTest({ questions: json.questions, current: 0, answers: {}, source: title });
                        setView('quiz');
                    } catch (e) { alert("Error API. Usando modo local."); loadMock(title); }
                } else {
                    loadMock(title);
                }
                setLoading(false);
            };

            const loadMock = (title) => {
                const mock = Array.from({length: numQ}, (_, i) => ({
                    q: `[PREGUNTA ${i+1}] Sobre la normativa de ${title}. ¿Cuál es la opción correcta según la Ley 5/2023?`,
                    options: ["Opción A (incorrecta)", "Opción B (incorrecta)", "Opción C (correcta)", "Opción D (incorrecta)"],
                    correct: 2,
                    expl: `Explicación para ${title}: Basado en el temario oficial de Andalucía 2024.`
                }));
                setTest({ questions: mock, current: 0, answers: {}, source: title });
                setView('quiz');
            };

            const handleAnswer = (idx) => {
                if (test.answers[test.current] !== undefined) return;
                if (idx !== -1 && idx !== test.questions[test.current].correct) {
                    saveFailed(test.questions[test.current]);
                }
                setTest(t => ({ ...t, answers: { ...t.answers, [t.current]: idx } }));
            };

            if (loading) return (
                <div className="h-screen bg-slate-900 flex flex-col items-center justify-center text-white p-10 text-center">
                    <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-black uppercase text-[10px] tracking-widest">Generando examen oficial...</p>
                </div>
            );

            return (
                <div className="app-height max-w-md mx-auto bg-white flex flex-col shadow-2xl relative overflow-hidden">
                    
                    {/* CABECERA */}
                    <header className="gradient-blue px-6 pt-10 pb-6 shrink-0 text-white rounded-b-[2rem] shadow-lg">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-xl font-black italic tracking-tighter">ANDALUCÍA <span className="text-blue-300">40T</span></h1>
                                <p className="text-[8px] font-bold opacity-60 uppercase tracking-widest">Cádiz y Municipios</p>
                            </div>
                            <div className="text-[9px] font-black bg-white/10 px-3 py-1 rounded-full border border-white/20">MASTER PRO</div>
                        </div>
                        {view === 'home' && (
                            <div className="flex gap-1 bg-black/20 p-1 rounded-xl">
                                {['temas', 'errores'].map(t => (
                                    <button 
                                        key={t}
                                        onClick={() => setActiveTab(t)}
                                        className={`flex-1 py-2 text-[9px] font-black uppercase rounded-lg transition-all ${activeTab === t ? 'bg-white text-blue-900' : 'text-white/40'}`}
                                    >
                                        {t === 'temas' ? 'Temario' : `Errores (${failedPool.length})`}
                                    </button>
                                ))}
                            </div>
                        )}
                    </header>

                    {/* CONTENIDO */}
                    <main className="scroll-area p-5 no-scrollbar">
                        {view === 'home' && activeTab === 'temas' && (
                            <div className="space-y-3">
                                {TEMARIO.map(t => (
                                    <button 
                                        key={t.id} 
                                        onClick={() => { setSelectedTopic(t); setView('config'); }}
                                        className="w-full bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-4 text-left active-scale shadow-sm animate-card"
                                    >
                                        <span className="w-8 h-8 bg-slate-50 rounded-lg flex items-center justify-center font-black text-slate-800 text-[10px]">{t.id}</span>
                                        <div className="flex-1">
                                            <p className="text-[12px] font-bold text-slate-700 leading-tight">{t.name}</p>
                                            <p className="text-[7px] font-black text-blue-500 uppercase mt-1">{t.cat}</p>
                                        </div>
                                        <i className="fa-solid fa-chevron-right text-slate-200 text-[10px]"></i>
                                    </button>
                                ))}
                            </div>
                        )}

                        {view === 'home' && activeTab === 'errores' && (
                            <div className="space-y-4">
                                {failedPool.length === 0 ? (
                                    <div className="text-center py-20 opacity-20">
                                        <i className="fa-solid fa-check-circle text-5xl mb-4"></i>
                                        <p className="font-black uppercase text-[10px]">Sin fallos</p>
                                    </div>
                                ) : (
                                    <>
                                        <button 
                                            onClick={() => { setTest({ questions: failedPool, current: 0, answers: {}, source: 'Repaso Errores' }); setView('quiz'); }}
                                            className="w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase text-[10px] shadow-lg active-scale"
                                        >
                                            Repasar {failedPool.length} Fallos
                                        </button>
                                        {failedPool.map((q, i) => (
                                            <div key={i} className="bg-white p-5 rounded-2xl border border-red-50 shadow-sm animate-card">
                                                <p className="text-[12px] font-bold text-slate-700 leading-relaxed mb-4">{q.q}</p>
                                                <button onClick={() => deleteLearned(q.q)} className="text-[9px] font-black text-red-400 uppercase"><i className="fa-solid fa-trash mr-2"></i>Ya la aprendí</button>
                                            </div>
                                        ))}
                                    </>
                                )}
                            </div>
                        )}

                        {view === 'config' && (
                            <div className="text-center py-10 animate-card">
                                <h3 className="text-xl font-black text-slate-800 mb-2 uppercase italic">{selectedTopic?.name}</h3>
                                <p className="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-10">Número de preguntas</p>
                                <div className="grid grid-cols-4 gap-2 mb-10 px-4">
                                    {[10, 20, 50, 100].map(n => (
                                        <button key={n} onClick={() => setNumQ(n)} className={`py-4 rounded-xl font-black transition-all ${numQ === n ? 'bg-blue-900 text-white' : 'bg-slate-50 text-slate-400'}`}>{n}</button>
                                    ))}
                                </div>
                                <button onClick={() => startTest(selectedTopic)} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-[11px] shadow-xl active-scale">Comenzar Examen</button>
                                <button onClick={() => setView('home')} className="mt-6 text-slate-300 font-black text-[9px] uppercase">Atrás</button>
                            </div>
                        )}

                        {view === 'quiz' && (
                            <div className="animate-card">
                                <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-50 min-h-[400px] flex flex-col">
                                    <div className="flex justify-between items-center mb-6">
                                        <span className="text-[8px] font-black text-blue-500 uppercase tracking-widest truncate max-w-[150px]">{test.source}</span>
                                        <span className="text-[10px] font-black text-slate-300">{test.current + 1} / {test.questions.length}</span>
                                    </div>
                                    
                                    <div className="flex-1">
                                        <h2 className="text-[14px] font-bold text-slate-800 mb-8 leading-relaxed">{test.questions[test.current]?.q}</h2>
                                        <div className="space-y-2">
                                            {test.questions[test.current]?.options.map((opt, i) => {
                                                const answered = test.answers[test.current] !== undefined && test.answers[test.current] !== -1;
                                                const isCorrect = i === test.questions[test.current].correct;
                                                const isSelected = i === test.answers[test.current];
                                                
                                                let style = "bg-slate-50 border-transparent text-slate-600";
                                                if (answered) {
                                                    if (isCorrect) style = "bg-green-100 border-green-500 text-green-900";
                                                    else if (isSelected) style = "bg-red-100 border-red-500 text-red-900 opacity-60";
                                                    else style = "opacity-40 grayscale";
                                                }

                                                return (
                                                    <button 
                                                        key={i} 
                                                        onClick={() => handleAnswer(i)}
                                                        className={`w-full p-4 rounded-xl border-2 text-left text-[12px] font-semibold transition-all flex gap-3 ${style}`}
                                                    >
                                                        <span className="opacity-30">{String.fromCharCode(65+i)}</span>
                                                        <span>{opt}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {(test.answers[test.current] !== undefined && test.answers[test.current] !== -1) && (
                                        <div className="mt-6 p-4 bg-slate-900 text-white rounded-xl text-[10px] italic leading-relaxed animate-card">
                                            {test.questions[test.current].expl}
                                        </div>
                                    )}
                                </div>

                                <div className="flex gap-2 mt-4">
                                    <button onClick={() => setTest(t => ({...t, current: Math.max(0, t.current-1)}))} className="flex-1 bg-white border py-4 rounded-xl font-black text-[9px] uppercase text-slate-400">Retroceder</button>
                                    {test.answers[test.current] === undefined ? (
                                        <button onClick={() => handleAnswer(-1)} className="flex-1 bg-slate-100 text-slate-400 py-4 rounded-xl font-black text-[9px] uppercase">Blanco</button>
                                    ) : (
                                        <button 
                                            onClick={() => {
                                                if(test.current < test.questions.length - 1) setTest(t => ({...t, current: t.current + 1}));
                                                else setView('results');
                                            }}
                                            className="flex-[2] bg-blue-900 text-white py-4 rounded-xl font-black text-[9px] uppercase shadow-lg"
                                        >
