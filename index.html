<script type="text/babel">
const { useState } = React;

const App = () => {
    const [view, setView] = useState('home'); 
    const [tab, setTab] = useState('municipios');
    const [test, setTest] = useState({ questions: [], current: 0, answers: {}, source: '' });
    const [loading, setLoading] = useState(false);

    const startTest = (item, type) => {
        setLoading(true);
        setTimeout(() => {
            const mock = Array.from({length: 20}, (_, i) => ({
                q: `[PREGUNTA ${type.toUpperCase()}] Relacionado con: ${item.name}. ¿Cuál es la respuesta correcta?`,
                options: ["Opción A (Correcta)", "Opción B", "Opción C", "Opción D"],
                correct: 0,
                expl: `Explicación detallada del contenido de ${item.name}.`
            }));
            setTest({ questions: mock, current: 0, answers: {}, source: item.name });
            setView('quiz');
            setLoading(false);
            window.scrollTo(0,0);
        }, 600);
    };

    const handleAnswer = (idx) => {
        if (test.answers[test.current] !== undefined) return;
        setTest(t => ({ ...t, answers: { ...t.answers, [t.current]: idx } }));
    };

    if (loading) return (
        <div className="h-screen flex items-center justify-center bg-slate-900 text-white">
            Cargando test...
        </div>
    );

    return (
        <div className="min-h-screen max-w-md mx-auto bg-slate-50 pb-32">

            {view === 'home' && (
                <div className="p-6 text-center font-bold">
                    Selecciona una categoría abajo
                </div>
            )}

            {view === 'quiz' && (
                <div className="p-4">
                    <button onClick={() => setView('home')}>← Salir</button>

                    <h2 className="font-bold mt-4">
                        Pregunta {test.current + 1}
                    </h2>

                    <p className="my-4">{test.questions[test.current].q}</p>

                    {test.questions[test.current].options.map((opt, i) => (
                        <button
                            key={i}
                            onClick={() => handleAnswer(i)}
                            className="block w-full border p-3 my-2"
                        >
                            {opt}
                        </button>
                    ))}

                    {test.answers[test.current] !== undefined && (
                        <div className="bg-slate-900 text-white p-3 mt-4">
                            {test.questions[test.current].expl}
                        </div>
                    )}

                    <button
                        className="mt-4 border p-3"
                        onClick={() => {
                            if (test.current < test.questions.length - 1)
                                setTest(t => ({...t, current: t.current + 1}));
                            else setView('results');
                        }}
                    >
                        Siguiente
                    </button>
                </div>
            )}

            {view === 'results' && (
                <div className="p-6 text-center">
                    <h2 className="text-2xl font-bold mb-4">Resultados</h2>
                    <button onClick={() => setView('home')} className="border p-3">
                        Volver al menú
                    </button>
                </div>
            )}

            {/* NAV INFERIOR */}
            {view === 'home' && (
                <nav className="fixed bottom-6 left-6 right-6 h-20 bg-slate-900 text-white rounded-2xl flex justify-around items-center">
                    <button onClick={() => startTest({name:"Municipios Cádiz"}, 'cadiz')}>
                        Cádiz
                    </button>

                    <button onClick={() => startTest({name:"Temario Oficial"}, 'tema')}>
                        Temas
                    </button>

                    <button onClick={() => startTest({name:"Psicotécnicos"}, 'psico')}>
                        Psico
                    </button>
                </nav>
            )}

        </div>
    );
};

// 🔥 ESTA LÍNEA FALTABA
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
