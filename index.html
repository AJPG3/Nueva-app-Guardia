<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CÁDIZ POL - Sistema de Oposición</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .option-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        @keyframes spin-fast { to { transform: rotate(360deg); } }
        .loader { border-top-color: #2563eb; animation: spin-fast 0.8s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MUNICIPIOS = [
            "Cádiz", "Jerez de la Frontera", "Algeciras", "San Fernando", 
            "El Puerto de Santa María", "Chiclana", "Sanlúcar", "La Línea", 
            "Puerto Real", "Arcos", "Rota", "Barbate"
        ];

        const App = () => {
            const [view, setView] = useState('menu');
            const [loading, setLoading] = useState(false);
            const [errorDb, setErrorDb] = useState([]);
            const [config, setConfig] = useState({ mun: "Cádiz", num: 25 });
            const [test, setTest] = useState({ 
                questions: [], 
                answers: {}, 
                current: 0, 
                finished: false 
            });

            const apiKey = "AIzaSyBl1TDv5-OIBZGYLTCQ_v4g_oxkJPNs6eg"; // Se proporciona automáticamente en ejecución

            // Cargar almacén de errores al iniciar
            useEffect(() => {
                const saved = localStorage.getItem('cadiz_pol_error_bank');
                if (saved) setErrorDb(JSON.parse(saved));
            }, []);

            const fetchAI = async (prompt, retries = 5) => {
                let delay = 1000;
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        if (!response.ok) throw new Error("API Limit");
                        const data = await response.json();
                        return JSON.parse(data.candidates[0].content.parts[0].text);
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const generateTest = async (isReview = false) => {
                setLoading(true);
                // Si pedimos 100, le pedimos a la IA que sea muy concisa para evitar el timeout
                const prompt = isReview 
                    ? `Actúa como examinador. Usa estos fallos: ${JSON.stringify(errorDb.slice(0, 20))}. Devuelve JSON: {"qs":[{"q":"..","o":[".."],"a":0,"j":".."}]}`
                    : `Genera ${config.num} preguntas de examen oficial Policía Local para ${config.mun} (Cádiz). Temario: Tráfico, Ley 7/85, Penal. Formato JSON estricto: {"qs":[{"q":"Pregunta","o":["A","B","C","D"],"a":0,"j":"Base legal"}]}`;

                try {
                    const result = await fetchAI(prompt);
                    setTest({
                        questions: result.qs,
                        answers: {},
                        current: 0,
                        finished: false,
                        municipio: isReview ? "Repaso de Errores" : config.mun
                    });
                    setView('quiz');
                } catch (e) {
                    alert("Error de conexión. La IA está saturada. Inténtalo de nuevo con menos preguntas o espera 10 segundos.");
                } finally {
                    setLoading(false);
                }
            };

            const handleAnswer = (idx) => {
                if (test.answers[test.current] !== undefined) return;
                
                const currentQuestion = test.questions[test.current];
                const isCorrect = idx === currentQuestion.a;

                // Si es incorrecta, guardar en el almacén de errores
                if (!isCorrect) {
                    const updatedErrors = [...errorDb];
                    if (!updatedErrors.find(e => e.q === currentQuestion.q)) {
                        updatedErrors.push(currentQuestion);
                        setErrorDb(updatedErrors);
                        localStorage.setItem('cadiz_pol_error_bank', JSON.stringify(updatedErrors));
                    }
                }

                setTest(prev => ({
                    ...prev,
                    answers: { ...prev.answers, [prev.current]: idx }
                }));
            };

            const removeError = (idx) => {
                const updated = errorDb.filter((_, i) => i !== idx);
                setErrorDb(updated);
                localStorage.setItem('cadiz_pol_error_bank', JSON.stringify(updated));
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white p-6 text-center">
                    <div className="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full loader mb-6"></div>
                    <p className="font-extrabold text-slate-800 uppercase tracking-tighter text-lg">Generando Examen Oficial...</p>
                    <p className="text-sm text-slate-400 mt-2 font-medium">Esto puede tardar unos segundos dependiendo del volumen de preguntas.</p>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto min-h-screen bg-white shadow-xl flex flex-col relative">
                    <header className="bg-slate-900 p-6 text-white flex justify-between items-center sticky top-0 z-50">
                        <h1 className="text-xl font-black italic tracking-tighter">CÁDIZ<span className="text-blue-500">POL</span></h1>
                        {view === 'quiz' && (
                            <div className="bg-blue-600 px-4 py-1 rounded-full text-[10px] font-black uppercase">
                                {test.current + 1} / {test.questions.length}
                            </div>
                        )}
                    </header>

                    <main className="flex-1 p-5 pb-32">
                        {view === 'menu' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <section className="bg-blue-600 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-blue-100">
                                    <h2 className="text-[10px] font-black uppercase tracking-widest opacity-70 mb-4">Simulador de Oposición</h2>
                                    <div className="space-y-5">
                                        <select value={config.mun} onChange={e => setConfig({...config, mun: e.target.value})} className="w-full bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/20 font-bold outline-none">
                                            {MUNICIPIOS.map(m => <option key={m} value={m} className="text-slate-900">{m}</option>)}
                                        </select>
                                        
                                        <div className="grid grid-cols-4 gap-2">
                                            {[10, 25, 50, 100].map(n => (
                                                <button key={n} onClick={() => setConfig({...config, num: n})} className={`py-3 rounded-xl text-xs font-black transition-all ${config.num === n ? 'bg-white text-blue-700' : 'bg-white/10 text-white hover:bg-white/20'}`}>{n}</button>
                                            ))}
                                        </div>
                                        
                                        <button onClick={() => generateTest(false)} className="w-full py-5 bg-white text-blue-900 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg active:scale-95 transition-all">Generar Test</button>
                                    </div>
                                </section>

                                {errorDb.length > 0 && (
                                    <section className="bg-white border-2 border-red-50 p-6 rounded-[2.5rem] shadow-sm flex items-center justify-between">
                                        <div>
                                            <p className="text-[10px] font-black text-red-500 uppercase mb-1">Almacén de Errores</p>
                                            <p className="text-2xl font-black text-slate-800">{errorDb.length} <span className="text-sm font-bold opacity-30">Fallos</span></p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setView('errors')} className="w-12 h-12 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center hover:bg-slate-100 transition-all"><i className="fa-solid fa-list"></i></button>
                                            <button onClick={() => generateTest(true)} className="w-12 h-12 bg-red-600 text-white rounded-2xl shadow-lg flex items-center justify-center active:scale-95 transition-all"><i className="fa-solid fa-play"></i></button>
                                        </div>
                                    </section>
                                )}
                            </div>
                        )}

                        {view === 'quiz' && (
                            <div className="animate-in slide-in-from-bottom-6 duration-500">
                                <div className="bg-slate-100 p-8 rounded-[2rem] mb-6 text-center shadow-inner">
                                    <p className="font-bold text-slate-800 text-lg leading-snug italic">"{test.questions[test.current].q}"</p>
                                </div>

                                <div className="space-y-3">
                                    {test.questions[test.current].o.map((o, i) => {
                                        const userAnswer = test.answers[test.current];
                                        const isCorrect = i === test.questions[test.current].a;
                                        const isSelected = userAnswer === i;
                                        const answered = userAnswer !== undefined;

                                        let btnClass = "bg-white border-slate-100 text-slate-600 hover:border-blue-300";
                                        if (answered) {
                                            if (isCorrect) btnClass = "bg-green-500 border-green-500 text-white shadow-xl scale-[1.02] z-10";
                                            else if (isSelected) btnClass = "bg-red-500 border-red-500 text-white opacity-90";
                                            else btnClass = "bg-white border-transparent opacity-30 grayscale-[0.5]";
                                        }

                                        return (
                                            <button key={i} onClick={() => handleAnswer(i)} disabled={answered} className={`w-full p-5 rounded-2xl text-left text-sm font-bold border-2 option-card flex items-start gap-4 ${btnClass}`}>
                                                <span className={`w-6 h-6 rounded-lg flex items-center justify-center text-[10px] font-black shrink-0 ${answered ? 'bg-white/20' : 'bg-slate-100 text-slate-400'}`}>
                                                    {String.fromCharCode(65+i)}
                                                </span>
                                                <span className="flex-1 leading-tight">{o}</span>
                                            </button>
                                        );
                                    })}
                                </div>

                                {test.answers[test.current] !== undefined && (
                                    <div className="mt-8 p-6 bg-slate-900 text-white rounded-[2rem] shadow-xl animate-in zoom-in-95 duration-300 border-t-4 border-blue-500">
                                        <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                            <i className="fa-solid fa-scroll"></i> Fundamento Legal
                                        </p>
                                        <p className="text-xs font-medium italic opacity-90 leading-relaxed">
                                            {test.questions[test.current].j}
                                        </p>
                                    </div>
                                )}

                                <div className="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex gap-4 max-w-xl mx-auto z-40">
                                    <button onClick={() => setTest(p => ({...p, current: Math.max(0, p.current-1)}))} className="w-16 h-16 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center active:scale-90 transition-all">
                                        <i className="fa-solid fa-chevron-left text-xl"></i>
                                    </button>
                                    
                                    {test.current < test.questions.length - 1 ? (
                                        <button onClick={() => setTest(p => ({...p, current: p.current + 1}))} className="flex-1 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Siguiente</button>
                                    ) : (
                                        <button onClick={() => setView('menu')} className="flex-1 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl animate-pulse">Finalizar Test</button>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'errors' && (
                            <div className="space-y-6 animate-in slide-in-from-right duration-500 pb-20">
                                <div className="flex justify-between items-center mb-10 px-2 sticky top-24 bg-white/50 backdrop-blur-md py-2 z-10">
                                    <h2 className="text-xl font-black italic uppercase tracking-tighter">Estudio de Fallos</h2>
                                    <button onClick={() => setView('menu')} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                
                                {errorDb.map((err, i) => (
                                    <div key={i} className="p-6 bg-white border-2 border-slate-50 rounded-[2.5rem] shadow-sm relative animate-in slide-in-from-bottom-4">
                                        <button onClick={() => removeError(i)} className="absolute -top-3 -right-3 w-12 h-12 bg-green-500 text-white rounded-2xl shadow-lg flex items-center justify-center border-4 border-white active:scale-90 transition-all">
                                            <i className="fa-solid fa-check"></i>
                                        </button>
                                        <p className="text-[10px] font-black text-slate-300 uppercase mb-3">Pregunta a Repasar</p>
                                        <p className="text-sm font-bold text-slate-800 pr-8 italic mb-4">"{err.q}"</p>
                                        <div className="bg-green-50 p-4 rounded-2xl mb-4 border border-green-100">
                                            <p className="text-[9px] font-black text-green-600 uppercase mb-1">Respuesta Correcta:</p>
                                            <p className="text-sm font-bold text-green-900">{err.o[err.a]}</p>
                                        </div>
                                        <div className="bg-slate-900 p-5 rounded-2xl text-[10px] text-white italic leading-relaxed font-medium opacity-90">
                                            {err.j}
                                        </div>
                                    </div>
                                ))}
                                {errorDb.length === 0 && setView('menu')}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
