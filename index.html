<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLICÍA LOCAL ANDALUCÍA - CÁDIZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        .gradient-header { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
        .main-container { height: 100vh; display: flex; flex-direction: column; }
        .scroll-content { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const apiKey = ""; // Deja vacío para usar banco de datos local
        const modelId = "gemini-2.5-flash-preview-09-2025";

        const TEMARIO_OFICIAL = [
            { id: 1, name: "La Constitución Española de 1978", cat: "Estado" },
            { id: 2, name: "Derechos y Deberes Fundamentales", cat: "Estado" },
            { id: 3, name: "El Tribunal Constitucional", cat: "Estado" },
            { id: 4, name: "La Corona / Las Cortes Generales", cat: "Estado" },
            { id: 5, name: "El Gobierno y la Administración", cat: "Estado" },
            { id: 6, name: "Organización Territorial del Estado", cat: "Estado" },
            { id: 7, name: "Estatuto de Autonomía de Andalucía", cat: "Autonomía" },
            { id: 8, name: "Instituciones de la Junta de Andalucía", cat: "Autonomía" },
            { id: 9, name: "Derecho Administrativo General", cat: "Admin" },
            { id: 10, name: "El Acto Administrativo", cat: "Admin" },
            { id: 11, name: "Régimen Local Español", cat: "Local" },
            { id: 12, name: "El Municipio: Concepto y Elementos", cat: "Local" },
            { id: 13, name: "Organización de los Municipios", cat: "Local" },
            { id: 14, name: "Competencias Municipales", cat: "Local" },
            { id: 15, name: "Haciendas Locales", cat: "Local" },
            { id: 16, name: "Función Pública Local", cat: "Local" },
            { id: 17, name: "La Policía Local: Concepto y Funciones", cat: "Policía" },
            { id: 18, name: "Ley 5/2023 de Policías Locales de Andalucía", cat: "Policía" },
            { id: 19, name: "Derechos y Deberes del Funcionario P.L.", cat: "Policía" },
            { id: 20, name: "Régimen Disciplinario P.L. Andalucía", cat: "Policía" },
            { id: 21, name: "Fuerzas y Cuerpos de Seguridad (LO 2/86)", cat: "Policía" },
            { id: 22, name: "Delitos y Faltas (Código Penal)", cat: "Penal" },
            { id: 23, name: "Delitos contra la Seguridad Vial", cat: "Penal" },
            { id: 24, name: "Derecho Procesal Penal / Detención", cat: "Penal" },
            { id: 25, name: "Policía Judicial y sus Funciones", cat: "Policía" },
            { id: 26, name: "Ley de Seguridad Ciudadana (LO 4/2015)", cat: "Estado" },
            { id: 27, name: "Tráfico: Ley de Seguridad Vial", cat: "Tráfico" },
            { id: 28, name: "Reglamento General de Circulación", cat: "Tráfico" },
            { id: 29, name: "Reglamento General de Vehículos", cat: "Tráfico" },
            { id: 30, name: "Transportes y Cargas", cat: "Tráfico" },
            { id: 31, name: "Seguridad Vial y Accidentología", cat: "Tráfico" },
            { id: 32, name: "Espectáculos Públicos en Andalucía", cat: "Específico" },
            { id: 33, name: "Medio Ambiente y Ruidos", cat: "Específico" },
            { id: 34, name: "Venta Ambulante / Consumo", cat: "Específico" },
            { id: 35, name: "Urbanismo y Ordenanzas Municipales", cat: "Específico" },
            { id: 36, name: "Protección Civil y Emergencias", cat: "Específico" },
            { id: 37, name: "Igualdad y Violencia de Género", cat: "Estado" },
            { id: 38, name: "Ética y Deontología Profesional", cat: "Policía" },
            { id: 39, name: "Psicotécnicos y Ómnibus", cat: "Psico" },
            { id: 40, name: "Ortografía y Cultura General", cat: "Cultura" }
        ];

        const EXAMENES_CADIZ = [
            { id: 'cad24', name: "Cádiz Capital (2024)", city: "Cádiz" },
            { id: 'jer23', name: "Jerez de la Fra. (2023)", city: "Jerez" },
            { id: 'pue24', name: "El Puerto Sta María (2024)", city: "El Puerto" },
            { id: 'san23', name: "San Fernando (2023)", city: "San Fernando" }
        ];

        const App = () => {
            const [view, setView] = useState('home'); // home, config, quiz, results, failed
            const [activeTab, setActiveTab] = useState('temas');
            const [loading, setLoading] = useState(false);
            const [failedPool, setFailedPool] = useState([]);
            const [numQ, setNumQ] = useState(20);
            const [selectedTarget, setSelectedTarget] = useState(null);
            const [test, setTest] = useState({ questions: [], current: 0, answers: {}, source: '' });

            useEffect(() => {
                const stored = localStorage.getItem('opocal_failed_v2');
                if (stored) setFailedPool(JSON.parse(stored));
            }, []);

            const saveFailed = (q) => {
                const isDuplicate = failedPool.some(item => item.q === q.q);
                if (!isDuplicate) {
                    const newPool = [...failedPool, q];
                    setFailedPool(newPool);
                    localStorage.setItem('opocal_failed_v2', JSON.stringify(newPool));
                }
            };

            const removeFailed = (qText) => {
                const newPool = failedPool.filter(item => item.q !== qText);
                setFailedPool(newPool);
                localStorage.setItem('opocal_failed_v2', JSON.stringify(newPool));
            };

            const startTest = async (target, isOfficial = false) => {
                setLoading(true);
                const sourceName = typeof target === 'string' ? target : target.name;
                
                // Si hay API Key, generamos con IA. Si no, usamos banco local de emergencia.
                if (apiKey) {
                    try {
                        const prompt = `Genera un examen de ${numQ} preguntas sobre "${sourceName}" para Policía Local de Andalucía. Incluye Ley 5/2023. JSON: { "questions": [{ "q": "", "options": ["","","",""], "correct": 0, "expl": "" }] }`;
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                        });
                        const data = await res.json();
                        const json = JSON.parse(data.candidates[0].content.parts[0].text);
                        setTest({ questions: json.questions, current: 0, answers: {}, source: sourceName });
                        setView('quiz');
                    } catch (e) { alert("Error al generar test con IA."); }
                } else {
                    // BANCO LOCAL DE EMERGENCIA
                    const mock = Array.from({length: numQ}, (_, i) => ({
                        q: `Pregunta de examen sobre ${sourceName} - Ejemplo #${i+1}`,
                        options: ["Respuesta A oficial", "Respuesta B incorrecta", "Respuesta C (Correcta)", "Respuesta D falsa"],
                        correct: 2,
                        expl: "Referencia legal: Según el articulado correspondiente de la normativa andaluza vigente."
                    }));
                    setTest({ questions: mock, current: 0, answers: {}, source: sourceName });
                    setView('quiz');
                }
                setLoading(false);
            };

            const handleAnswer = (idx) => {
                if (test.answers[test.current] !== undefined) return;
                const correct = test.questions[test.current].correct;
                if (idx !== -1 && idx !== correct) saveFailed(test.questions[test.current]);
                setTest(t => ({ ...t, answers: { ...t.answers, [t.current]: idx } }));
            };

            if (loading) return (
                <div className="h-screen bg-slate-900 flex flex-col items-center justify-center text-white">
                    <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-[10px] font-black uppercase tracking-widest">Preparando examen...</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto bg-white h-screen shadow-2xl overflow-hidden flex flex-col relative">
                    
                    {/* HEADER */}
                    <header className="gradient-header px-6 pt-12 pb-6 shrink-0 text-white rounded-b-[2.5rem] shadow-lg z-10">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-black italic tracking-tighter">LOCAL MASTER <span className="text-blue-400">PRO</span></h1>
                                <p className="text-[8px] font-bold opacity-60 uppercase tracking-[0.3em]">Cádiz y Provincia</p>
                            </div>
                            <div className="bg-white/10 px-3 py-1 rounded-full text-[8px] font-black border border-white/10">40 TEMAS</div>
                        </div>
                        
                        {view === 'home' && (
                            <div className="flex gap-1 mt-6 bg-black/20 p-1 rounded-2xl">
                                {['temas', 'oficiales', 'errores'].map(t => (
                                    <button 
                                        key={t}
                                        onClick={() => setActiveTab(t)}
                                        className={`flex-1 py-2.5 text-[9px] font-black uppercase rounded-xl transition-all ${activeTab === t ? 'bg-white text-slate-900 shadow-md' : 'text-white/40'}`}
                                    >
                                        {t === 'errores' ? `Errores (${failedPool.length})` : t}
                                    </button>
                                ))}
                            </div>
                        )}
                    </header>

                    {/* CONTENIDO PRINCIPAL */}
                    <main className="scroll-content p-6 no-scrollbar">
                        {view === 'home' && (
                            <div className="animate-in">
                                {activeTab === 'temas' && (
                                    <div className="space-y-3">
                                        {TEMARIO_OFICIAL.map(t => (
                                            <div key={t.id} onClick={() => { setSelectedTarget(t); setView('config'); }} className="bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-4 active-scale shadow-sm">
                                                <div className="w-9 h-9 bg-slate-50 text-slate-900 rounded-xl flex items-center justify-center font-black text-[10px] border border-slate-100">{t.id}</div>
                                                <div className="flex-1">
                                                    <p className="text-[12px] font-bold text-slate-700 leading-tight">{t.name}</p>
                                                    <span className="text-[8px] font-black text-blue-500 uppercase tracking-widest">{t.cat}</span>
                                                </div>
                                                <i className="fa-solid fa-chevron-right text-slate-200 text-xs"></i>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {activeTab === 'oficiales' && (
                                    <div className="space-y-4">
                                        <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100 mb-4">
                                            <h3 className="font-black text-blue-900 text-sm uppercase">Simulacros Reales</h3>
                                            <p className="text-[10px] text-blue-700/60 font-bold uppercase mt-1">Preguntas extraídas de convocatorias locales de Cádiz.</p>
                                        </div>
                                        {EXAMENES_CADIZ.map(ex => (
                                            <div key={ex.id} onClick={() => startTest(ex.name)} className="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center active-scale shadow-sm">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-10 h-10 bg-blue-900 text-white rounded-full flex items-center justify-center"><i className="fa-solid fa-file-invoice"></i></div>
                                                    <h4 className="font-bold text-slate-800 text-sm">{ex.name}</h4>
                                                </div>
                                                <i className="fa-solid fa-play text-blue-400"></i>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {activeTab === 'errores' && (
                                    <div className="space-y-4">
                                        {failedPool.length === 0 ? (
                                            <div className="text-center py-20">
                                                <i className="fa-solid fa-shield-check text-5xl text-slate-100 mb-4"></i>
                                                <p className="text-slate-300 text-[10px] font-black uppercase tracking-widest">Sin fallos registrados</p>
                                            </div>
                                        ) : (
                                            <>
                                                <button onClick={() => { setTest({ questions: failedPool, current: 0, answers: {}, source: 'Limpieza de Fallos' }); setView('quiz'); }} className="w-full bg-red-600 text-white py-5 rounded-2xl font-black uppercase text-[10px] shadow-lg active-scale">Repasar {failedPool.length} Fallos</button>
                                                {failedPool.map((q, idx) => (
                                                    <div key={idx} className="bg-white p-5 rounded-2xl border border-red-50 shadow-sm animate-in">
                                                        <p className="text-[12px] font-bold text-slate-700 leading-relaxed mb-4">{q.q}</p>
                                                        <div className="flex justify-between items-center">
                                                            <span className="text-[8px] font-black text-red-400 bg-red-50 px-2 py-1 rounded">PENDIENTE</span>
                                                            <button onClick={() => removeFailed(q.q)} className="text-[9px] font-black text-slate-400 hover:text-green-600 transition-colors uppercase"><i className="fa-solid fa-check-double mr-2"></i>Ya me la sé</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'config' && (
                            <div className="animate-in bg-white p-8 rounded-[3rem] shadow-xl border border-slate-50 text-center">
                                <div className="w-16 h-16 bg-blue-50 text-blue-900 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl"><i className="fa-solid fa-sliders"></i></div>
                                <h3 className="text-xl font-black text-slate-800 mb-2 uppercase italic">{selectedTarget?.name}</h3>
                                <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-10">Configura tu examen</p>
                                
                                <div className="grid grid-cols-4 gap-2 mb-10">
                                    {[10, 20, 50, 100].map(n => (
                                        <button key={n} onClick={() => setNumQ(n)} className={`py-4 rounded-2xl font-black transition-all ${numQ === n ? 'bg-blue-900 text-white shadow-lg' : 'bg-slate-50 text-slate-400 active-scale'}`}>{n}</button>
                                    ))}
                                </div>

                                <button onClick={() => startTest(selectedTarget)} className="w-full bg-blue-600 text-white py-6 rounded-3xl font-black uppercase tracking-widest text-[10px] shadow-xl active-scale mb-4">Generar Test</button>
                                <button onClick={() => setView('home')} className="w-full py-4 text-[9px] font-black text-slate-300 uppercase">Cancelar</button>
                            </div>
                        )}

                        {view === 'quiz' && (
                            <div className="animate-in">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 min-h-[450px] flex flex-col">
                                    <div className="flex justify-between items-center mb-8">
                                        <div className="flex flex-col">
                                            <span className="text-[8px] font-black text-blue-500 uppercase tracking-widest truncate max-w-[150px]">{test.source}</span>
                                            <span className="text-[10px] font-black text-slate-300 mt-1">{test.current + 1} / {test.questions.length}</span>
                                        </div>
                                        <button onClick={() => setView('results')} className="px-4 py-2 bg-slate-900 text-white text-[8px] font-black uppercase rounded-xl tracking-widest active-scale">Finalizar</button>
                                    </div>

                                    <div className="flex-1">
                                        <h2 className="text-[15px] font-bold text-slate-800 mb-8 leading-snug">{test.questions[test.current]?.q}</h2>
                                        <div className="space-y-3">
                                            {test.questions
