<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CÁDIZ POL - Test Oficiales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; }
        .option-transition { transition: all 0.2s ease-in-out; }
        #root { min-height: 100vh; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const MUNICIPIOS = [
            "Cádiz Capital", "Jerez de la Frontera", "Algeciras", "San Fernando", 
            "El Puerto de Santa María", "Chiclana", "Sanlúcar de Barrameda", "La Línea", 
            "Puerto Real", "Arcos de la Frontera", "Rota", "Barbate"
        ];

        const App = () => {
            const [view, setView] = useState('menu'); 
            const [test, setTest] = useState({ questions: [], current: 0, answers: {}, results: null });
            const [errorDb, setErrorDb] = useState([]);
            const [loading, setLoading] = useState(false);
            const [selectedMun, setSelectedMun] = useState(MUNICIPIOS[0]);
            const [numQ, setNumQ] = useState(25);

            // API KEY - El entorno la proporciona automáticamente
            const apiKey = "AIzaSyBl1TDv5-OIBZGYLTCQ_v4g_oxkJPNs6eg"; 

            useEffect(() => {
                const saved = localStorage.getItem('cadiz_police_errors_v2');
                if (saved) {
                    try { setErrorDb(JSON.parse(saved)); } catch(e) { console.error("Error al cargar datos locales", e); }
                }
            }, []);

            // Función de llamada a IA con Reintentos (Exponential Backoff)
            const callGeminiAI = async (prompt, retries = 5, delay = 1000) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { 
                                    responseMimeType: "application/json" 
                                }
                            })
                        });

                        if (!response.ok) {
                            if (response.status === 429 || response.status >= 500) {
                                throw new Error("Retryable error");
                            }
                            throw new Error("Fatal error");
                        }

                        const data = await response.json();
                        return JSON.parse(data.candidates[0].content.parts[0].text);
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2; // Doblar el tiempo de espera en cada reintento
                    }
                }
            };

            const generateTest = async (isReview = false) => {
                setLoading(true);
                const prompt = isReview 
                    ? `Actúa como examinador. Toma estas preguntas de fallos anteriores: ${JSON.stringify(errorDb.slice(0, numQ))}. Devuelve EXACTAMENTE un JSON con la estructura: {"questions":[{"q":"pregunta","o":["opcion1","opcion2","opcion3","opcion4"],"a":indice_correcta,"j":"justificacion"}]}`
                    : `Genera un examen oficial de Policía Local para el municipio de ${selectedMun}, Cádiz. Deben ser ${numQ} preguntas de nivel oposición real. Devuelve EXACTAMENTE un objeto JSON: {"questions":[{"q":"texto de la pregunta","o":["opción A","opción B","opción C","opción D"],"a":0,"j":"justificación legal con artículo"}]}. Importante: 'a' es el índice de la respuesta correcta de 0 a 3.`;

                try {
                    const result = await callGeminiAI(prompt);
                    
                    if (!result || !result.questions) throw new Error("Formato inválido");

                    setTest({
                        questions: result.questions,
                        current: 0,
                        answers: {},
                        results: null,
                        municipio: isReview ? "Batería de Errores" : selectedMun
                    });
                    setView('quiz');
                } catch (e) {
                    console.error(e);
                    alert("Error de conexión con el motor de IA. Inténtalo de nuevo en unos segundos.");
                } finally {
                    setLoading(false);
                }
            };

            const handleAnswer = (idx) => {
                if (test.answers[test.current] !== undefined) return;
                setTest(prev => ({ ...prev, answers: { ...prev.answers, [prev.current]: idx } }));
            };

            const finalizeTest = () => {
                let corrects = 0; let fails = 0; let empty = 0;
                const failedQuestions = [];

                test.questions.forEach((q, i) => {
                    const ans = test.answers[i];
                    if (ans === undefined) empty++;
                    else if (ans === q.a) corrects++;
                    else {
                        fails++;
                        failedQuestions.push(q);
                    }
                });

                const newErrorDb = [...errorDb];
                failedQuestions.forEach(fq => {
                    if (!newErrorDb.find(e => e.q === fq.q)) newErrorDb.push(fq);
                });
                setErrorDb(newErrorDb);
                localStorage.setItem('cadiz_police_errors_v2', JSON.stringify(newErrorDb));

                const score = ((corrects - (fails/3)) / test.questions.length * 10).toFixed(2);
                setTest(prev => ({ ...prev, results: { corrects, fails, empty, score: Math.max(0, parseFloat(score)).toFixed(2) } }));
                setView('results');
            };

            const removeFromErrorDb = (index) => {
                const updated = errorDb.filter((_, i) => i !== index);
                setErrorDb(updated);
                localStorage.setItem('cadiz_police_errors_v2', JSON.stringify(updated));
            };

            if (loading) return (
                <div className="flex flex-col items-center justify-center h-screen bg-slate-50">
                    <div className="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin-custom mb-6"></div>
                    <p className="font-extrabold text-slate-800 uppercase tracking-widest text-sm">Accediendo a la base de datos oficial...</p>
                    <p className="text-[10px] text-slate-400 mt-2 font-bold">{selectedMun.toUpperCase()}</p>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative border-x border-slate-100">
                    <header className="bg-slate-900 p-6 text-white flex justify-between items-center sticky top-0 z-30 shadow-md">
                        <div>
                            <h1 className="text-xl font-black italic">CÁDIZ<span className="text-blue-500">POL</span></h1>
                        </div>
                        {view === 'quiz' && <span className="text-xs font-black bg-blue-600 px-4 py-1.5 rounded-full">{test.current + 1} / {test.questions.length}</span>}
                    </header>

                    <main className="flex-1 p-5 pb-32">
                        {view === 'menu' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <section className="bg-gradient-to-br from-blue-600 to-blue-800 p-8 rounded-[2.5rem] text-white shadow-xl shadow-blue-100">
                                    <h2 className="text-[10px] font-black uppercase tracking-widest opacity-70 mb-2">Simulador Oficial</h2>
                                    <h3 className="text-2xl font-black mb-6 leading-tight">Preparación Policía Local Cádiz</h3>
                                    
                                    <div className="space-y-4">
                                        <div className="bg-white/10 backdrop-blur-md p-2 rounded-2xl">
                                            <select value={selectedMun} onChange={e => setSelectedMun(e.target.value)} className="w-full bg-transparent p-3 font-bold text-sm outline-none border-none text-white appearance-none">
                                                {MUNICIPIOS.map(m => <option key={m} value={m} className="text-slate-900 font-bold">{m}</option>)}
                                            </select>
                                        </div>
                                        
                                        <div className="flex gap-2">
                                            {[10, 25, 50, 100].map(n => (
                                                <button key={n} onClick={() => setNumQ(n)} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${numQ === n ? 'bg-white text-blue-700' : 'bg-white/10 text-white/60 hover:bg-white/20'}`}>{n}</button>
                                            ))}
                                        </div>
                                        
                                        <button onClick={() => generateTest(false)} className="w-full py-5 bg-white text-blue-900 rounded-2xl font-black uppercase text-xs tracking-[0.2em] shadow-lg active:scale-95 transition-all">Generar Examen</button>
                                    </div>
                                </section>

                                {errorDb.length > 0 && (
                                    <section className="bg-white border-2 border-red-50 p-6 rounded-[2rem] shadow-sm flex justify-between items-center">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center text-xl">
                                                <i className="fa-solid fa-bolt"></i>
                                            </div>
                                            <div>
                                                <p className="text-xs font-black text-slate-400 uppercase tracking-tighter">Batería de Fallos</p>
                                                <p className="text-lg font-black text-red-600">{errorDb.length} Preguntas</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setView('errors')} className="w-12 h-12 bg-slate-100 text-slate-500 rounded-2xl hover:bg-slate-200 transition-all"><i className="fa-solid fa-list"></i></button>
                                            <button onClick={() => generateTest(true)} className="w-12 h-12 bg-red-600 text-white rounded-2xl shadow-lg active:scale-95 transition-all"><i className="fa-solid fa-play"></i></button>
                                        </div>
                                    </section>
                                )}
                            </div>
                        )}

                        {view === 'quiz' && (
                            <div className="animate-in slide-in-from-bottom-6 duration-500">
                                <div className="bg-slate-100/50 border border-slate-200 p-8 rounded-[2rem] mb-8 text-center shadow-inner">
                                    <p className="font-bold text-slate-800 text-lg leading-snug italic">"{test.questions[test.current].q}"</p>
                                </div>
                                
                                <div className="space-y-3 mb-8">
                                    {test.questions[test.current].o.map((o, i) => {
                                        const userAnswer = test.answers[test.current];
                                        const isCorrect = i === test.questions[test.current].a;
                                        const isSelected = userAnswer === i;
                                        const answered = userAnswer !== undefined;
                                        
                                        let btnClass = "bg-white border-slate-200 text-slate-600 hover:border-blue-400 shadow-sm";
                                        if (answered) {
                                            if (isCorrect) btnClass = "bg-green-500 border-green-500 text-white shadow-green-100 scale-[1.02] z-10";
                                            else if (isSelected) btnClass = "bg-red-500 border-red-500 text-white opacity-90";
                                            else btnClass = "bg-white border-slate-100 opacity-30 grayscale-[0.5]";
                                        }

                                        return (
                                            <button key={i} onClick={() => handleAnswer(i)} disabled={answered} className={`w-full p-5 rounded-2xl text-left text-sm font-bold border-2 flex items-start gap-4 transition-all duration-300 relative ${btnClass}`}>
                                                <span className={`w-6 h-6 rounded-lg flex items-center justify-center text-[10px] font-black shrink-0 ${answered ? 'bg-white/20' : 'bg-slate-100 text-slate-400'}`}>
                                                    {String.fromCharCode(65+i)}
                                                </span>
                                                <span className="flex-1 leading-tight">{o}</span>
                                            </button>
                                        );
                                    })}
                                </div>

                                {test.answers[test.current] !== undefined && (
                                    <div className="p-6 bg-slate-900 text-white rounded-[2rem] shadow-xl animate-in zoom-in-95 duration-300 mb-8 border-t-4 border-blue-500">
                                        <p className="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-2 flex items-center gap-2">
                                            <i className="fa-solid fa-balance-scale"></i> Fundamento Jurídico
                                        </p>
                                        <p className="text-xs font-medium italic opacity-90 leading-relaxed">
                                            {test.questions[test.current].j}
                                        </p>
                                    </div>
                                )}

                                <div className="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex gap-4 max-w-xl mx-auto z-40">
                                    <button onClick={() => setTest(p => ({...p, current: Math.max(0, p.current-1)}))} className="w-16 h-16 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center hover:bg-slate-200 active:scale-90 transition-all">
                                        <i className="fa-solid fa-arrow-left text-xl"></i>
                                    </button>
                                    {test.current < test.questions.length - 1 ? 
                                        <button onClick={() => setTest(p => ({...p, current: p.current+1}))} className="flex-1 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Siguiente Pregunta</button> :
                                        <button onClick={finalizeTest} className="flex-1 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl animate-pulse">Finalizar Test</button>
                                    }
                                </div>
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="text-center animate-in zoom-in-95 duration-500 py-10">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Resultado del Examen</p>
                                <h2 className="text-8xl font-black mb-10 text-slate-900 italic tracking-tighter drop-shadow-sm">{test.results.score}</h2>
                                
                                <div className="grid grid-cols-3 gap-3 mb-12 px-2">
                                    <div className="bg-green-50 p-5 rounded-3xl border border-green-100 shadow-sm">
                                        <p className="text-3xl font-black text-green-600 leading-none mb-1">{test.results.corrects}</p>
                                        <p className="text-[9px] font-black text-green-700/50 uppercase">Correctas</p>
                                    </div>
                                    <div className="bg-red-50 p-5 rounded-3xl border border-red-100 shadow-sm">
                                        <p className="text-3xl font-black text-red-600 leading-none mb-1">{test.results.fails}</p>
                                        <p className="text-[9px] font-black text-red-700/50 uppercase">Errores</p>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-3xl border border-slate-100 shadow-sm">
                                        <p className="text-3xl font-black text-slate-400 leading-none mb-1">{test.results.empty}</p>
                                        <p className="text-[9px] font-black text-slate-400/50 uppercase">Blancos</p>
                                    </div>
                                </div>
                                
                                <button onClick={() => setView('menu')} className="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-2xl active:scale-95 transition-all">Regresar al Inicio</button>
                            </div>
                        )}

                        {view === 'errors' && (
                            <div className="space-y-6 animate-in slide-in-from-right duration-500">
                                <div className="flex justify-between items-center mb-10 px-2 sticky top-24 bg-white/50 backdrop-blur-md py-2 z-10">
                                    <h2 className="text-xl font-black italic uppercase tracking-tighter">Batería de Errores</h2>
                                    <button onClick={() => setView('menu')} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400"><i className="fa-solid fa-x
