<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpoCádiz - Policía Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .selected { border: 3px solid #2563eb !important; background-color: #eff6ff !important; }
        .correct { border-color: #22c55e !important; background-color: #dcfce7 !important; }
        .wrong { border-color: #ef4444 !important; background-color: #fee2e2 !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold">OpoCádiz <span class="text-blue-400">Pro</span></h1>
            <div class="text-xs bg-blue-800 px-3 py-1 rounded-full">
                Errores: <span id="error-badge" class="font-bold">0</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <section id="home-screen" class="space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold text-slate-800 mb-4">Simulador Oficial</h2>
                
                <label class="block text-sm font-semibold text-slate-600 mb-2">Selecciona contenido:</label>
                <select id="filtro-categoria" class="w-full p-4 bg-slate-50 border rounded-xl mb-4 text-sm focus:ring-2 ring-blue-500 outline-none">
                    <option value="todos">Todo el temario (Temas 1-40)</option>
                    <optgroup label="Bloque I: Derecho Constitucional">
                        <option value="tema1">Tema 1: Constitución Española</option>
                        <option value="tema2">Tema 2: El Tribunal Constitucional</option>
                    </optgroup>
                    <optgroup label="Exámenes Provincia Cádiz">
                        <option value="cadiz_cap">Ayuntamiento de Cádiz (Oficial)</option>
                        <option value="jerez">Ayuntamiento de Jerez (Oficial)</option>
                        <option value="algeciras">Ayuntamiento de Algeciras (Oficial)</option>
                    </optgroup>
                </select>

                <label class="block text-sm font-semibold text-slate-600 mb-2">Número de preguntas:</label>
                <div id="selector-cant" class="grid grid-cols-4 gap-2 mb-6 text-center">
                    <button onclick="updateCant(10)" class="cant-btn py-2 rounded-lg border bg-white" id="c10">10</button>
                    <button onclick="updateCant(25)" class="cant-btn py-2 rounded-lg border bg-blue-600 text-white" id="c25">25</button>
                    <button onclick="updateCant(50)" class="cant-btn py-2 rounded-lg border bg-white" id="c50">50</button>
                    <button onclick="updateCant(100)" class="cant-btn py-2 rounded-lg border bg-white" id="c100">100</button>
                </div>

                <button onclick="initTest()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition">
                    GENERAR EXAMEN
                </button>
            </div>

            <button onclick="initErrores()" class="w-full py-4 bg-red-50 text-red-600 border-2 border-red-100 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm">
                <span>REPASAR FALLOS</span>
            </button>
        </section>

        <section id="test-screen" class="hidden animate-in fade-in duration-300">
            <div class="flex justify-between items-center mb-4 text-xs font-bold text-slate-400">
                <span id="label-progreso">PREGUNTA 1 DE 25</span>
                <span id="label-porcentaje">0% ACIERTO</span>
            </div>

            <div id="card-pregunta" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
                <p id="q-meta" class="text-[10px] text-blue-500 font-bold uppercase mb-2">Tema 1</p>
                <h3 id="q-text" class="text-lg font-bold text-slate-800 leading-tight">...</h3>
                <div id="q-options" class="mt-6 space-y-3"></div>
            </div>

            <div class="flex gap-4">
                <button onclick="handlePrev()" class="flex-1 py-4 bg-slate-200 rounded-xl font-bold text-slate-600 active:bg-slate-300">Atrás</button>
                <button onclick="handleNext()" class="flex-1 py-4 bg-blue-900 rounded-xl font-bold text-white shadow-md active:bg-black">Siguiente</button>
            </div>
            
            <button onclick="showResults()" class="w-full mt-6 py-2 text-red-500 font-bold text-sm">FINALIZAR Y CORREGIR</button>
        </section>

        <section id="results-screen" class="hidden bg-white p-8 rounded-2xl shadow-xl text-center border-t-8 border-blue-600">
            <h2 class="text-2xl font-black text-slate-800">Resultado</h2>
            <div id="res-score" class="text-6xl font-black my-6 text-blue-600">0%</div>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                    <p class="text-2xl font-bold text-green-600" id="res-aciertos">0</p>
                    <p class="text-xs text-green-700 font-bold">Aciertos</p>
                </div>
                <div class="bg-red-50 p-4 rounded-xl border border-red-100">
                    <p class="text-2xl font-bold text-red-600" id="res-fallos">0</p>
                    <p class="text-xs text-red-700 font-bold">Fallos</p>
                </div>
            </div>

            <button onclick="location.reload()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold">Nuevo Intento</button>
        </section>
    </main>

    <script>

            { id: 2, cat: "tema1", t: "Tema 1: Constitución", p: "La forma política del Estado español es:", o: ["La Monarquía absoluta", "La Monarquía parlamentaria", "La República federal"], c: 1 },
            
            // TEMA 2: TRIBUNAL CONSTITUCIONAL
            { id: 3, cat: "tema2", t: "Tema 2: T. Constitucional", p: "¿Cuántos miembros integran el Tribunal Constitucional?", o: ["10 miembros", "12 miembros", "15 miembros"], c: 1 },
            
            // EXAMEN CÁDIZ CAPITAL
            { id: 4, cat: "cadiz_cap", t: "Examen Oficial Cádiz", p: "¿Quién ostenta la Jefatura de la Policía Local de Cádiz?", o: ["El Concejal de Seguridad", "El Alcalde", "El Subdelegado del Gobierno"], c: 1 },
            { id: 5, cat: "cadiz_cap", t: "Examen Oficial Cádiz", p: "Según la Orden
