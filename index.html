<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASTER POLICÍA LOCAL ANDALUCÍA</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{background:#0f172a;font-family:sans-serif}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState,useEffect} = React;

// 🔥 PON TU API KEY
const API_KEY = "AIzaSyBl1TDv5-OIBZGYLTCQ_v4g_oxkJPNs6eg";
const MODEL = "gemini-1.5-flash";

const TEMAS = [
"Constitución Española",
"Derechos Fundamentales",
"Organización Territorial",
"Estatuto de Andalucía",
"Ley Policías Locales Andalucía",
"Derecho Penal",
"Seguridad Vial",
"Reglamento Circulación",
"Procedimiento Administrativo",
"Protección Civil"
];

function App(){

const [view,setView]=useState("menu");
const [loading,setLoading]=useState(false);
const [questions,setQuestions]=useState([]);
const [current,setCurrent]=useState(0);
const [answers,setAnswers]=useState({});
const [fallos,setFallos]=useState(
JSON.parse(localStorage.getItem("fallos")||"[]")
);

//////////////////////////////////////////////////////////
// GENERAR TEST IA
//////////////////////////////////////////////////////////

async function generarTest(tema,cantidad){

setLoading(true);

const prompt = `
Crea ${cantidad} preguntas tipo test para oposiciones de Policía Local Andalucía sobre ${tema}.
Formato JSON:

[
{"q":"","options":["","","",""],"correct":0,"expl":""}
]
`;

try{

const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
contents:[{parts:[{text:prompt}]}]
})
}
);

const data = await res.json();
const text = data.candidates[0].content.parts[0].text;
const json = JSON.parse(text.replace(/```json|```/g,""));

setQuestions(json);
setCurrent(0);
setAnswers({});
setView("quiz");

}catch(e){
alert("Error IA");
console.log(e);
}

setLoading(false);
}

//////////////////////////////////////////////////////////
// RESPONDER
//////////////////////////////////////////////////////////

function responder(i){

if(answers[current]!=undefined) return;

const nueva = {...answers,[current]:i};
setAnswers(nueva);

if(i !== questions[current].correct){
const nuevosFallos=[...fallos,questions[current]];
setFallos(nuevosFallos);
localStorage.setItem("fallos",JSON.stringify(nuevosFallos));
}

}

//////////////////////////////////////////////////////////
// RESULTADOS
//////////////////////////////////////////////////////////

function resultados(){

const correctas = Object.keys(answers).filter(
i => answers[i] === questions[i].correct
).length;

return(
<div className="p-6 text-center text-white">

<h1 className="text-3xl font-black mb-6">RESULTADOS</h1>

<p className="text-xl mb-4">Aciertos: {correctas}</p>
<p className="text-xl mb-8">Fallos: {questions.length-correctas}</p>

<button onClick={()=>setView("menu")}
className="bg-blue-600 px-6 py-3 rounded-xl font-bold">
Volver al menú
</button>

</div>
);
}

//////////////////////////////////////////////////////////
// LOADING
//////////////////////////////////////////////////////////

if(loading)
return <div className="h-screen flex items-center justify-center text-white text-2xl">
Generando examen IA...
</div>;

//////////////////////////////////////////////////////////
// MENU
//////////////////////////////////////////////////////////

if(view==="menu")
return(
<div className="max-w-md mx-auto p-6 text-white">

<h1 className="text-3xl font-black mb-6">
MASTER POLICÍA LOCAL
</h1>

<h2 className="font-bold mb-3">TEST POR TEMA</h2>

{TEMAS.map(t=>
<button
key={t}
onClick={()=>generarTest(t,20)}
className="w-full bg-blue-600 p-3 rounded-xl mb-2 font-bold">
{t}
</button>
)}

<h2 className="font-bold mt-6 mb-3">MODO EXAMEN</h2>

<button
onClick={()=>generarTest("Temario completo",50)}
className="w-full bg-green-600 p-3 rounded-xl mb-2 font-bold">
Examen 50 preguntas
</button>

<button
onClick={()=>generarTest("Temario completo",100)}
className="w-full bg-green-700 p-3 rounded-xl mb-2 font-bold">
Examen 100 preguntas
</button>

<h2 className="font-bold mt-6 mb-3">REPASO FALLOS</h2>

<button
onClick={()=>{
if(fallos.length===0) return alert("No hay fallos");
setQuestions(fallos);
setCurrent(0);
setAnswers({});
setView("quiz");
}}
className="w-full bg-red-600 p-3 rounded-xl font-bold">
Preguntas falladas ({fallos.length})
</button>

</div>
);

//////////////////////////////////////////////////////////
// QUIZ
//////////////////////////////////////////////////////////

if(view==="quiz"){

const q = questions[current];

return(
<div className="max-w-md mx-auto p-6 text-white">

<button onClick={()=>setView("menu")} className="mb-4">
← Salir
</button>

<p className="mb-4">
Pregunta {current+1} / {questions.length}
</p>

<p className="mb-4">{q.q}</p>

{q.options.map((opt,i)=>{

const answered = answers[current]!=undefined;
const correct = i===q.correct;
const selected = i===answers[current];

let style="border p-3 w-full text-left mb-2 rounded";

if(answered){
if(correct) style+=" bg-green-600";
else if(selected) style+=" bg-red-600";
else style+=" opacity-40";
}

return(
<button key={i} onClick={()=>responder(i)} className={style}>
{String.fromCharCode(65+i)}. {opt}
</button>
);

})}

{answers[current]!=undefined &&
<div className="bg-slate-800 p-3 mt-4 rounded">
{q.expl}
</div>
}

<button
onClick={()=>{
if(current < questions.length-1) setCurrent(current+1);
else setView("results");
}}
className="bg-blue-600 w-full p-3 mt-4 rounded font-bold">
Siguiente
</button>

</div>
);
}

//////////////////////////////////////////////////////////

if(view==="results") return resultados();

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
