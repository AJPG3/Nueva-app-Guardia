<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpoCádiz - Policía Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .selected { border: 2px solid #2563eb; background-color: #dbeafe; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <header class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-10">
        <h1 class="text-xl font-bold text-center">OpoCádiz: Policía Local</h1>
        <div id="stats-bar" class="text-xs text-center mt-2 flex justify-around">
            <span>Aciertos: <b id="total-aciertos">0</b></span>
            <span>Fallos: <b id="total-fallos">0</b></span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <section id="setup-screen" class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">Configurar Test</h2>
            
            <label class="block mb-2 text-sm">Número de preguntas:</label>
            <select id="num-preguntas" class="w-full p-2 border rounded mb-4">
                <option value="10">10 preguntas</option>
                <option value="25">25 preguntas</option>
                <option value="50">50 preguntas</option>
                <option value="100">100 preguntas</option>
            </select>

            <button onclick="iniciarTest()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                Comenzar Test
            </button>
            
            <button onclick="verErrores()" class="w-full mt-4 border border-red-500 text-red-500 py-3 rounded-lg font-bold hover:bg-red-50">
                Repasar Errores (<span id="count-errores">0</span>)
            </button>
        </section>

        <section id="test-screen" class="hidden">
            <div class="flex justify-between items-center mb-4 text-sm font-medium text-gray-500">
                <span id="progreso-texto">Pregunta 1 de 10</span>
                <span id="timer" class="text-blue-600">00:00</span>
            </div>

            <div id="pregunta-container" class="bg-white p-6 rounded-xl shadow-md mb-6">
                <h3 id="pregunta-enunciado" class="text-md font-bold mb-4">Cargando pregunta...</h3>
                <div id="opciones" class="space-y-3">
                    </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <button onclick="anterior()" class="bg-gray-200 py-3 rounded-lg font-bold text-gray-700">Atrás</button>
                <button onclick="siguiente()" class="bg-blue-600 py-3 rounded-lg font-bold text-white">Siguiente</button>
                <button onclick="finalizarTest()" class="bg-red-600 py-3 rounded-lg font-bold text-white">Finalizar</button>
            </div>
            
            <p class="text-center text-xs mt-4 text-gray-400 italic">Puedes avanzar sin contestar para dejar en blanco.</p>
        </section>

        <section id="results-screen" class="hidden bg-white p-6 rounded-xl shadow-md text-center">
            <h2 class="text-2xl font-bold mb-4">Resultado</h2>
            <div class="text-5xl font-extrabold text-blue-600 mb-2" id="res-porcentaje">80%</div>
            <p id="res-detalle" class="text-gray-600 mb-6">Has acertado 8 de 10 preguntas.</p>
            <button onclick="location.reload()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Volver al Inicio</button>
        </section>

    </main>

    <script>
        // --- BASE DE DATOS DE EJEMPLO (Aquí meterás tus 40 temas) ---
        const bancoPreguntas = [
            { id: 1, tema: 1, p: "¿Cuál es la capital de la provincia de Cádiz?", o: ["Jerez", "Cádiz", "Algeciras"], c: 1 },
            { id: 2, tema: 1, p: "Según la CE, la soberanía nacional reside en...", o: ["El Rey", "Las Cortes", "El pueblo español"], c: 2 },
            { id: 3, tema: 12, p: "¿Cuántos municipios tiene la provincia de Cádiz?", o: ["44", "45", "40"], c: 1 },
            // Añade aquí tantas como quieras...
        ];

        let preguntasTest = [];
        let respuestasUsuario = []; 
        let indiceActual = 0;
        let errores = JSON.parse(localStorage.getItem('errores_poli')) || [];

        document.getElementById('count-errores').innerText = errores.length;

        function iniciarTest() {
            const cant = parseInt(document.getElementById('num-preguntas').value);
            // Mezclar y seleccionar cantidad
            preguntasTest = bancoPreguntas.sort(() => 0.5 - Math.random()).slice(0, cant);
            respuestasUsuario = new Array(preguntasTest.length).fill(null);
            indiceActual = 0;
            
            mostrarPantalla('test-screen');
            renderPregunta();
        }

        function renderPregunta() {
            const p = preguntasTest[indiceActual];
            document.getElementById('progreso-texto').innerText = `Pregunta ${indiceActual + 1} de ${preguntasTest.length}`;
            document.getElementById('pregunta-enunciado').innerText = p.p;
            
            const contenedorOpciones = document.getElementById('opciones');
            contenedorOpciones.innerHTML = '';
            
            p.o.forEach((opcion, i) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 border rounded-lg transition ${respuestasUsuario[indiceActual] === i ? 'selected' : 'bg-gray-50'}`;
                btn.innerText = opcion;
                btn.onclick = () => seleccionarOpcion(i);
                contenedorOpciones.appendChild(btn);
            });
        }

        function seleccionarOpcion(index) {
            respuestasUsuario[indiceActual] = index;
            renderPregunta();
        }

        function siguiente() {
            if (indiceActual < preguntasTest.length - 1) {
                indiceActual++;
                renderPregunta();
            }
        }

        function anterior() {
            if (indiceActual > 0) {
                indiceActual--;
                renderPregunta();
            }
        }

        function finalizarTest() {
            let aciertos = 0;
            let fallos = 0;
            let nuevosErrores = [...errores];

            preguntasTest.forEach((p, i) => {
                if (respuestasUsuario[i] === p.c) {
                    aciertos++;
                    // Si estaba en errores y acertamos, podríamos dar la opción de borrarlo después
                } else if (respuestasUsuario[i] !== null) {
                    fallos++;
                    // Guardar error si no estaba ya
                    if (!nuevosErrores.find(e => e.id === p.id)) {
                        nuevosErrores.push(p);
                    }
                }
            });

            errores = nuevosErrores;
            localStorage.setItem('errores_poli', JSON.stringify(errores));
            
            const porcentaje = Math.round((aciertos / preguntasTest.length) * 100);
            document.getElementById('res-porcentaje').innerText = `${porcentaje}%`;
            document.getElementById('res-detalle').innerText = `Aciertos: ${aciertos} | Fallos: ${fallos} | Blancos: ${preguntasTest.length - aciertos - fallos}`;
            
            mostrarPantalla('results-screen');
        }

        function mostrarPantalla(id) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('test-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function verErrores() {
            if (errores.length === 0) return alert("¡No tienes errores guardados!");
            preguntasTest = [...errores].sort(() => 0.5 - Math.random());
            respuestasUsuario = new Array(preguntasTest.length).fill(null);
            indiceActual = 0;
            mostrarPantalla('test-screen');
            renderPregunta();
        }
    </script>
</body>
</html>
