<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CÁDIZ POL - Sistema de Test</title>
    
    <!-- Cargamos Tailwind primero para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        .option-transition { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Loader de respaldo si falla el renderizado */
        #fallback-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: white;
            z-index: 9999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root">
        <div id="fallback-loader">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: #64748b; font-weight: bold;">Cargando OPO-POL...</p>
        </div>
    </div>

    <!-- Carga de librerías esenciales -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const MUNICIPIOS = [
            "Cádiz Capital", "Jerez de la Frontera", "Algeciras", "San Fernando", 
            "El Puerto de Santa María", "Chiclana", "Sanlúcar de Barrameda", "La Línea", 
            "Puerto Real", "Arcos de la Frontera", "Rota", "Barbate"
        ];

        const App = () => {
            const [view, setView] = useState('menu'); 
            const [test, setTest] = useState({ questions: [], current: 0, answers: {}, results: null });
            const [errorDb, setErrorDb] = useState([]);
            const [loading, setLoading] = useState(false);
            const [selectedMun, setSelectedMun] = useState(MUNICIPIOS[0]);
            const [numQ, setNumQ] = useState(25);

            const apiKey = "AIzaSyBl1TDv5-OIBZGYLTCQ_v4g_oxkJPNs6eg"; 

            useEffect(() => {
                const saved = localStorage.getItem('cadiz_police_errors_prod');
                if (saved) {
                    try { setErrorDb(JSON.parse(saved)); } catch(e) { console.error(e); }
                }
            }, []);

            const callGemini = async (prompt, retries = 5) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                let delay = 1000;

                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        if (!response.ok) throw new Error();
                        const data = await response.json();
                        return JSON.parse(data.candidates[0].content.parts[0].text);
                    } catch (e) {
                        if (i === retries - 1) throw e;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const generateTest = async (isReview = false) => {
                setLoading(true);
                const prompt = isReview 
                    ? `Convierte estos datos en un examen JSON: ${JSON.stringify(errorDb.slice(0, numQ))}. Formato: {"questions":[{"q":"...","o":["..."],"a":0,"j":"..."}]}`
                    : `Genera examen Policía Local en ${selectedMun}, Cádiz. ${numQ} preguntas. Formato JSON: {"questions":[{"q":"...","o":["A","B","C","D"],"a":0,"j":"justificación legal"}]}`;

                try {
                    const result = await callGemini(prompt);
                    setTest({
                        questions: result.questions,
                        current: 0,
                        answers: {},
                        results: null,
                        municipio: isReview ? "Batería de Errores" : selectedMun
                    });
                    setView('quiz');
                } catch (e) {
                    alert("Error al conectar con la IA. Por favor, reintenta.");
                } finally {
                    setLoading(false);
                }
            };

            const handleAnswer = (idx) => {
                if (test.answers[test.current] !== undefined) return;
                setTest(prev => ({ ...prev, answers: { ...prev.answers, [prev.current]: idx } }));
            };

            const finalizeTest = () => {
                let corrects = 0; let fails = 0;
                const failedQuestions = [];

                test.questions.forEach((q, i) => {
                    const ans = test.answers[i];
                    if (ans === q.a) corrects++;
                    else if (ans !== undefined) {
                        fails++;
                        failedQuestions.push(q);
                    }
                });

                const newErrorDb = [...errorDb];
                failedQuestions.forEach(fq => {
                    if (!newErrorDb.find(e => e.q === fq.q)) newErrorDb.push(fq);
                });
                setErrorDb(newErrorDb);
                localStorage.setItem('cadiz_police_errors_prod', JSON.stringify(newErrorDb));

                const score = ((corrects - (fails/3)) / test.questions.length * 10).toFixed(2);
                setTest(p => ({ ...p, results: { corrects, fails, score: Math.max(0, score) } }));
                setView('results');
            };

            if (loading) return (
                <div className="flex-1 flex flex-col items-center justify-center p-10 bg-white">
                    <div className="spinner mb-4"></div>
                    <p className="font-bold text-slate-700 uppercase text-xs tracking-widest">Generando Examen Oficial...</p>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto flex-1 flex flex-col bg-white shadow-xl min-h-screen">
                    <header className="bg-slate-900 p-6 text-white flex justify-between items-center shadow-lg">
                        <h1 className="text-xl font-black tracking-tighter italic">CÁDIZ<span className="text-blue-500">POL</span></h1>
                        {view === 'quiz' && <span className="text-[10px] font-black bg-blue-600 px-3 py-1 rounded-lg">{test.current + 1} / {test.questions.length}</span>}
                    </header>

                    <main className="flex-1 p-5 pb-32">
                        {view === 'menu' && (
                            <div className="space-y-6">
                                <div className="bg-slate-50 border border-slate-200 p-8 rounded-[2rem]">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Configuración</h2>
                                    <select value={selectedMun} onChange={e => setSelectedMun(e.target.value)} className="w-full p-4 rounded-2xl border-2 border-white shadow-sm font-bold text-slate-700 mb-4 focus:border-blue-500 outline-none">
                                        {MUNICIPIOS.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                    <div className="flex gap-2 mb-6">
                                        {[10, 25, 50].map(n => (
                                            <button key={n} onClick={() => setNumQ(n)} className={`flex-1 py-3 rounded-xl font-black text-xs ${numQ === n ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-white text-slate-400 border'}`}>{n} Q</button>
                                        ))}
                                    </div>
                                    <button onClick={() => generateTest(false)} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-transform">Iniciar Test</button>
                                </div>

                                {errorDb.length > 0 && (
                                    <div className="bg-red-50 p-6 rounded-[2rem] border border-red-100 flex justify-between items-center">
                                        <div>
                                            <p className="text-[10px] font-black text-red-400 uppercase mb-1">Repaso de Errores</p>
                                            <p className="text-lg font-black text-red-600">{errorDb.length} Fallos</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setView('errors')} className="w-12 h-12 bg-white text-red-600 rounded-2xl border shadow-sm"><i className="fa-solid fa-list"></i></button>
                                            <button onClick={() => generateTest(true)} className="w-12 h-12 bg-red-600 text-white rounded-2xl shadow-lg"><i className="fa-solid fa-play"></i></button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'quiz' && (
                            <div className="animate-in fade-in duration-500">
                                <div className="bg-slate-50 p-6 rounded-3xl mb-6 border border-slate-100 min-h-[120px] flex items-center justify-center text-center">
                                    <p className="font-bold text-slate-800 leading-tight italic">"{test.questions[test.current].q}"</p>
                                </div>
                                <div className="space-y-3">
                                    {test.questions[test.current].o.map((o, i) => {
                                        const ans = test.answers[test.current];
                                        const isCorrect = i === test.questions[test.current].a;
                                        const isSelected = ans === i;
                                        const done = ans !== undefined;
                                        
                                        let style = "bg-white border-slate-100 text-slate-600 shadow-sm";
                                        if (done) {
                                            if (isCorrect) style = "bg-green-500 border-green-500 text-white shadow-lg scale-[1.02]";
                                            else if (isSelected) style = "bg-red-500 border-red-500 text-white opacity-90";
                                            else style = "bg-white border-transparent opacity-40";
                                        }

                                        return (
                                            <button key={i} onClick={() => handleAnswer(i)} disabled={done} className={`w-full p-5 rounded-2xl text-left text-sm font-bold border-2 option-transition flex gap-4 items-start ${style}`}>
                                                <span className="font-black opacity-30">{String.fromCharCode(65+i)}</span>
                                                <span className="leading-tight">{o}</span>
                                            </button>
                                        );
                                    })}
                                </div>

                                {test.answers[test.current] !== undefined && (
                                    <div className="mt-8 p-6 bg-slate-900 text-white rounded-[2rem] text-xs leading-relaxed italic border-t-4 border-blue-500 shadow-2xl">
                                        <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2">Justificación Legal:</p>
                                        {test.questions[test.current].j}
                                    </div>
                                )}

                                <div className="fixed bottom-0 left-0 right-0 p-5 bg-white/80 backdrop-blur-md border-t flex gap-4 max-w-xl mx-auto z-50">
                                    <button onClick={() => setTest(p => ({...p, current: Math.max(0, p.current-1)}))} className="w-16 h-16 bg-slate-100 rounded-2xl text-slate-400"><i className="fa-solid fa-arrow-left"></i></button>
                                    {test.current < test.questions.length - 1 ? 
                                        <button onClick={() => setTest(p => ({...p, current: p.current+1}))} className="flex-1 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Siguiente</button> :
                                        <button onClick={finalizeTest} className="flex-1 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Finalizar</button>
                                    }
                                </div>
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="text-center py-10">
                                <h2 className="text-8xl font-black text-slate-900 mb-2 italic">{test.results.score}</h2>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-10">Nota Final (Puntuación Oficial)</p>
                                <div className="flex gap-4 justify-center mb-10">
                                    <div className="bg-green-50 px-6 py-4 rounded-2xl"><p className="text-2xl font-black text-green-600">{test.results.corrects}</p><p className="text-[8px] font-bold text-green-700 uppercase">Bien</p></div>
                                    <div className="bg-red-50 px-6 py-4 rounded-2xl"><p className="text-2xl font-black text-red-600">{test.results.fails}</p><p className="text-[8px] font-bold text-red-700 uppercase">Mal</p></div>
                                </div>
                                <button onClick={() => setView('menu')} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest">Volver al Inicio</button>
                            </div>
                        )}

                        {view === 'errors' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="font-black uppercase tracking-widest text-slate-400 text-xs">Batería de Errores</h2>
                                    <button onClick={() => setView('menu')} className="w-10 h-10 bg-slate-100 rounded-full text-slate-400"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                {errorDb.map((err, i) => (
                                    <div key={i} className="p-6 bg-white border border-slate-200 rounded-3xl relative">
                                        <button onClick={() => {
                                            const up = errorDb.filter((_, idx) => idx !== i);
                                            setErrorDb(up);
                                            localStorage.setItem('cadiz_police_errors_prod', JSON.stringify(up));
                                        }} className="absolute top-4 right-4 text-green-600 bg-green-50 w-10 h-10 rounded-xl flex items-center justify-center"><i className="fa-solid fa-check"></i></button>
                                        <p className="text-sm font-bold text-slate-800 pr-10 mb-2 leading-snug">"{err.q}"</p>
                                        <p className="text-[10px] font-black text-green-600 uppercase mb-2">Respuesta: {err.o[err.a]}</p>
                                        <div className="bg-slate-50 p-3 rounded-xl text-[10px] italic text-slate-500 leading-relaxed">{err.j}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // Renderizado controlado para evitar pantalla en blanco en GitHub
        function initApp() {
            if (typeof React !== 'undefined' && typeof Babel !== 'undefined') {
                const rootElement = document.getElementById('root');
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            } else {
                setTimeout(initApp, 100);
            }
        }
        
        window.onload = initApp;
    </script>
</body>
</html>
