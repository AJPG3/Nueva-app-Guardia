<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CÁDIZ POL - Sistema de Oposición</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .option-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-header { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin-fast { animation: spin 0.8s linear infinite; }
        .safe-area-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MUNICIPIOS = [
            "Cádiz", "Jerez de la Frontera", "Algeciras", "San Fernando", 
            "El Puerto de Santa María", "Chiclana", "Sanlúcar de Barrameda", "La Línea", 
            "Puerto Real", "Arcos", "Rota", "Barbate"
        ];

        const App = () => {
            const [view, setView] = useState('menu');
            const [loading, setLoading] = useState(false);
            const [errorDb, setErrorDb] = useState([]);
            const [config, setConfig] = useState({ mun: "Cádiz", num: 25 });
            const [test, setTest] = useState({ 
                questions: [], 
                answers: {}, 
                current: 0, 
                finished: false,
                municipio: "" 
            });

            const apiKey = "AIzaSyBl1TDv5-OIBZGYLTCQ_v4g_oxkJPNs6eg"; 

            // Cargar almacén de errores persistente
            useEffect(() => {
                const savedErrors = localStorage.getItem('opol_cadiz_v5_errors');
                if (savedErrors) {
                    try { setErrorDb(JSON.parse(savedErrors)); } catch(e) { console.error(e); }
                }
            }, []);

            const fetchQuestions = async (prompt, retries = 5) => {
                let delay = 1500;
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { 
                                    responseMimeType: "application/json",
                                    temperature: 0.7
                                }
                            })
                        });
                        
                        if (!response.ok) throw new Error("Traffic Limit");
                        const data = await response.json();
                        const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
                        return parsed.questions || parsed.qs;
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const startTest = async (isReview = false) => {
                setLoading(true);
                // Si es un test de 100 preguntas, le pedimos a la IA menos explicaciones largas para no saturar
                const prompt = isReview 
                    ? `Actúa como preparador de Policía Local de Cádiz. Usa estos fallos previos: ${JSON.stringify(errorDb.slice(0, 20))}. Devuelve JSON: {"questions":[{"q":"..","o":[".."],"a":0,"j":".."}]}`
                    : `Genera un examen de ${config.num} preguntas tipo test para la oposición de Policía Local en ${config.mun} (Provincia de Cádiz). Temario: Derecho Penal, Tráfico, Vía Pública y Ordenanzas Municipales. Formato JSON: {"questions":[{"q":"pregunta","o":["opción A","opción B","opción C","opción D"],"a":indice_correcta,"j":"justificacion_legal_con_articulo"}]}`;

                try {
                    const questions = await fetchQuestions(prompt);
                    setTest({
                        questions,
                        answers: {},
                        current: 0,
                        finished: false,
                        municipio: isReview ? "Repaso de Errores" : config.mun
                    });
                    setView('quiz');
                } catch (e) {
                    alert("Error de conexión con la IA (Tráfico saturado). Por favor, intenta de nuevo con 25 preguntas o espera unos segundos.");
                } finally {
                    setLoading(false);
                }
            };

            const handleAnswer = (idx) => {
                if (test.answers[test.current] !== undefined || test.finished) return;
                
                const q = test.questions[test.current];
                const isCorrect = idx === q.a;

                // Si falla, se guarda en el almacén de errores automáticamente
                if (!isCorrect) {
                    const newErrors = [...errorDb];
                    if (!newErrors.find(e => e.q === q.q)) {
                        newErrors.push(q);
                        setErrorDb(newErrors);
                        localStorage.setItem('opol_cadiz_v5_errors', JSON.stringify(newErrors));
                    }
                }

                setTest(prev => ({
                    ...prev,
                    answers: { ...prev.answers, [prev.current]: idx }
                }));
            };

            const removeError = (idx) => {
                const updated = errorDb.filter((_, i) => i !== idx);
                setErrorDb(updated);
                localStorage.setItem('opol_cadiz_v5_errors', JSON.stringify(updated));
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white p-8">
                    <div className="w-14 h-14 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin-fast mb-6"></div>
                    <h2 className="text-xl font-black text-slate-800 uppercase tracking-tighter">Preparando Examen...</h2>
                    <p className="text-sm text-slate-400 mt-2 font-medium">Configurando preguntas para {config.mun}</p>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative">
                    <header className="glass-header p-6 text-white flex justify-between items-center sticky top-0 z-50 shadow-xl">
                        <div>
                            <h1 className="text-xl font-black italic tracking-tighter">CÁDIZ<span className="text-blue-500">POL</span></h1>
                            <p className="text-[9px] font-bold opacity-40 uppercase tracking-widest">Academia Digital</p>
                        </div>
                        {view === 'quiz' && (
                            <div className="bg-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black">
                                {test.current + 1} / {test.questions.length}
                            </div>
                        )}
                    </header>

                    <main className="flex-1 p-5 pb-36">
                        {view === 'menu' && (
                            <div className="space-y-6 animate-in fade-in duration-700">
                                <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400 mb-6">Nuevo Simulacro</h2>
                                        <div className="space-y-5">
                                            <div>
                                                <label className="text-[10px] font-bold text-white/40 uppercase ml-2 mb-2 block">Municipio de Cádiz</label>
                                                <select value={config.mun} onChange={e => setConfig({...config, mun: e.target.value})} className="w-full bg-white/10 p-4 rounded-2xl border border-white/10 font-bold outline-none focus:border-blue-500 transition-all">
                                                    {MUNICIPIOS.map(m => <option key={m} value={m} className="text-slate-900">{m}</option>)}
                                                </select>
                                            </div>
                                            
                                            <div>
                                                <label className="text-[10px] font-bold text-white/40 uppercase ml-2 mb-2 block">Número de preguntas</label>
                                                <div className="grid grid-cols-4 gap-2">
                                                    {[10, 25, 50, 100].map(n => (
                                                        <button key={n} onClick={() => setConfig({...config, num: n})} className={`py-3 rounded-xl text-xs font-black transition-all ${config.num === n ? 'bg-blue-600 text-white' : 'bg-white/5 text-white/60 hover:bg-white/10'}`}>{n}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            
                                            <button onClick={() => startTest(false)} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-[0.2em] shadow-lg shadow-blue-900/40 active:scale-95 transition-all">Empezar Test</button>
                                        </div>
                                    </div>
                                    <div className="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-600/20 rounded-full blur-3xl"></div>
                                </div>

                                {errorDb.length > 0 && (
                                    <div className="bg-white border-2 border-red-50 p-6 rounded-[2.5rem] flex items-center justify-between shadow-sm">
                                        <div className="flex items-center gap-4">
                                            <div className="w-14 h-14 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center text-xl shadow-inner">
                                                <i className="fa-solid fa-graduation-cap"></i>
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-red-400 uppercase">Almacén de Errores</p>
                                                <p className="text-xl font-black text-slate-800">{errorDb.length} <span className="text-sm font-bold opacity-30">Pendientes</span></p>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setView('errors')} className="w-12 h-12 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center hover:bg-slate-100 transition-all"><i className="fa-solid fa-book-open"></i></button>
                                            <button onClick={() => startTest(true)} className="w-12 h-12 bg-red-600 text-white rounded-2xl shadow-xl flex items-center justify-center active:scale-95 transition-all"><i className="fa-solid fa-play"></i></button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'quiz' && (
                            <div className="animate-in slide-in-from-bottom-8 duration-500">
                                <div className="bg-slate-50 border border-slate-100 p-8 rounded-[2rem] mb-6 text-center relative">
                                    <p className="font-bold text-slate-800 text-lg leading-snug italic">"{test.questions[test.current].q}"</p>
                                    <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-white px-4 py-1 rounded-full border border-slate-100 text-[9px] font-black text-slate-400 uppercase tracking-widest">{test.municipio}</div>
                                </div>

                                <div className="space-y-3">
                                    {test.questions[test.current].o.map((o, i) => {
                                        const userAnswer = test.answers[test.current];
                                        const isCorrect = i === test.questions[test.current].a;
                                        const isSelected = userAnswer === i;
                                        const answered = userAnswer !== undefined;

                                        let style = "bg-white border-slate-100 text-slate-600 hover:border-blue-200";
                                        if (answered) {
                                            if (isCorrect) style = "bg-green-500 border-green-500 text-white shadow-xl scale-[1.02] z-10";
                                            else if (isSelected) style = "bg-red-500 border-red-500 text-white opacity-90";
                                            else style = "bg-white border-transparent opacity-30 grayscale-[0.5]";
                                        }

                                        return (
                                            <button key={i} onClick={() => handleAnswer(i)} disabled={answered} className={`w-full p-5 rounded-2xl text-left text-sm font-bold border-2 option-card flex items-start gap-4 ${style}`}>
                                                <span className={`w-6 h-6 rounded-lg flex items-center justify-center text-[10px] font-black shrink-0 ${answered ? 'bg-white/20' : 'bg-slate-100 text-slate-400'}`}>
                                                    {String.fromCharCode(65+i)}
                                                </span>
                                                <span className="flex-1 leading-tight pt-0.5">{o}</span>
                                            </button>
                                        );
                                    })}
                                </div>

                                {test.answers[test.current] !== undefined && (
                                    <div className="mt-8 p-6 bg-slate-900 text-white rounded-[2rem] shadow-2xl animate-in zoom-in-95 duration-300 border-t-4 border-blue-500">
                                        <p className="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-2 flex items-center gap-2">
                                            <i className="fa-solid fa-gavel text-xs"></i> Fundamento Legal
                                        </p>
                                        <p className="text-xs font-medium italic opacity-90 leading-relaxed">
                                            {test.questions[test.current].j}
                                        </p>
                                    </div>
                                )}

                                <div className="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex gap-4 max-w-xl mx-auto z-40 safe-area-pb">
                                    <button onClick={() => setTest(p => ({...p, current: Math.max(0, p.current-1)}))} className="w-16 h-16 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center active:scale-90 transition-all">
                                        <i className="fa-solid fa-chevron-left text-xl"></i>
                                    </button>
                                    
                                    {test.current < test.questions.length - 1 ? (
                                        <button onClick={() => setTest(p => ({...p, current: p.current + 1}))} className="flex-1 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Siguiente Pregunta</button>
                                    ) : (
                                        <button onClick={() => setView('menu')} className="flex-1 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl animate-pulse">Finalizar y Guardar</button>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'errors' && (
                            <div className="animate-in slide-in-from-right duration-500 space-y-6">
                                <div className="flex justify-between items-center mb-10 px-2 sticky top-24 bg-white/50 backdrop-blur-md py-4 z-10 border-b border-slate-100">
                                    <h2 className="text-xl font-black italic uppercase tracking-tighter text-slate-800">Estudio de Errores</h2>
                                    <button onClick={() => setView('menu')} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                
                                {errorDb.map((err, i) => (
                                    <div key={i} className="p-6 bg-white border-2 border-slate-50 rounded-[2.5rem] shadow-sm relative animate-in slide-in-from-bottom-4">
                                        <button onClick={() => removeError(i)} className="absolute -top-3 -right-3 w-12 h-12 bg-green-500 text-white rounded-2xl shadow-lg flex items-center justify-center border-4 border-white active:scale-90 transition-all">
                                            <i className="fa-solid fa-check"></i>
                                        </button>
                                        <p className="text-[10px] font-black text-slate-300 uppercase mb-3">Pregunta Fallada</p>
                                        <p className="text-sm font-bold text-slate-800 pr-8 italic mb-4">"{err.q}"</p>
                                        <div className="bg-green-50 p-4 rounded-2xl mb-4 border border-green-100">
                                            <p className="text-[9px] font-black text-green-600 uppercase mb-1">Respuesta Correcta:</p>
                                            <p className="text-sm font-bold text-green-900">{err.o[err.a]}</p>
                                        </div>
                                        <div className="bg-slate-900 p-5 rounded-2xl text-[10px] text-white italic leading-relaxed font-medium opacity-90 border-l-4 border-blue-500">
                                            {err.j}
                                        </div>
                                    </div>
                                ))}
